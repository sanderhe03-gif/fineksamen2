<script id="qbank" type="application/json">[{"id": "f1", "topic": "Foundations", "type": "written", "q": "What are financial markets and what is their role? List and explain at least 3 aspects.", "a": "Financial markets are venues (physical or electronic) where financial claims — stocks, bonds, derivatives, currencies — are issued and traded between savers and borrowers. Three core roles: (1) Capital allocation: channel funds from surplus units (savers) to deficit units (firms, governments) so productive projects get financed. (2) Price discovery: continuous trading aggregates information into prices that signal expected risk and return, guiding investment decisions across the economy. (3) Liquidity provision: investors can convert assets to cash quickly, which lowers the required return on capital and encourages investment. Additional roles include risk sharing (diversification, hedging via derivatives), monitoring of firms (via market discipline), and consumption smoothing across time."}, {"id": "f2", "topic": "Foundations", "type": "written", "q": "Provide the definition of financial markets. Discuss the differences between primary and secondary markets. Give at least one example for each.", "a": "Financial markets are organized arrangements for trading financial assets. Primary market: where securities are *first issued* — issuers (firms, governments) sell directly to investors and receive the proceeds. Example: an IPO, a seasoned equity offering, or a Treasury auction. Secondary market: where *already-issued* securities are traded between investors; the issuer is not a party and receives no proceeds. Example: ordinary trading on the NYSE, NASDAQ, or Oslo Børs. The primary market raises new capital; the secondary market provides liquidity, which in turn lowers the required return investors demand at issuance and so makes the primary market function."}, {"id": "f3", "topic": "Foundations", "type": "written", "q": "What is consumption smoothing? Discuss how it affects incentives for trading.", "a": "Consumption smoothing is the desire of households to keep consumption relatively stable over time despite uneven income. Because of diminishing marginal utility of consumption, an extra dollar consumed in a low-income period is worth more than one in a high-income period. This creates incentives to trade financial claims: people save (lend) when income is high to consume in retirement or during shocks, and borrow when income is low (e.g. students, young homebuyers) against future income. Financial markets are precisely the mechanism that lets these inter-temporal trades happen — bonds, mortgages, pensions, and equities all exist partly because agents want to redistribute consumption across states and time."}, {"id": "f4", "topic": "Foundations", "type": "written", "q": "What is risk aversion? Are people generally risk averse? If so, why do they trade risky securities?", "a": "A risk-averse investor prefers a certain payoff to a risky gamble with the same expected value — equivalently, has a concave utility function. Empirical evidence (insurance demand, equity premium, experimental data) confirms most investors are risk averse. They still trade risky securities for two reasons: (1) Risky assets offer a *risk premium* — expected return above the risk-free rate — that compensates them for bearing risk; if the premium is high enough, expected utility from holding the risky asset exceeds the certain alternative. (2) Diversification: by combining many imperfectly correlated risky assets, idiosyncratic risk is reduced, so the portfolio's risk per unit of expected return falls. Risk aversion does not mean avoiding risk altogether — it means demanding compensation for it."}, {"id": "f5", "topic": "Foundations", "type": "written", "q": "Discuss the risk-return trade-off in the context of assets. Explain why it is unlikely to find an asset with high expected returns and low volatility.", "a": "In equilibrium, expected return rises with non-diversifiable (systematic) risk: investors are risk averse, so they only hold riskier assets if they offer a higher expected return. The mechanism is price pressure: if an asset somehow had high expected return and low volatility, demand would be huge, the price would be bid up, and the expected return (which is future cashflows / current price) would fall until it lined up with risk. Conversely, an asset with high volatility and low expected return would be sold off, its price would fall, and its expected return would rise. So competitive trading enforces the trade-off. Apparent exceptions usually reflect (i) hidden risks (tail risk, illiquidity, model risk), (ii) market frictions, or (iii) measurement error in expected returns."}, {"id": "f6", "topic": "Foundations", "type": "written", "q": "What is portfolio diversification? What types of risk can and cannot be diversified away?", "a": "Diversification is combining many assets in a portfolio so that imperfectly correlated returns offset each other and total portfolio variance falls. *Idiosyncratic (firm-specific, unsystematic)* risk — strikes, lawsuits, management changes, single-firm news — can be diversified away because such shocks average out across many holdings; in the limit, with enough independent positions, idiosyncratic risk goes to zero. *Systematic (market) risk* — recessions, rate shocks, geopolitical events — affects most assets simultaneously and cannot be diversified away by combining stocks; only hedging or holding less risk in aggregate can reduce it. Because investors *can* eliminate idiosyncratic risk for free, asset pricing models (CAPM, APT) reward only systematic risk."}, {"id": "f7", "topic": "Foundations", "type": "written", "q": "What is a no-arbitrage condition? Explain why and how arbitrage opportunities quickly disappear from the market.", "a": "A no-arbitrage condition states there is no way to construct a portfolio that requires zero net investment, has no risk, and yields a strictly positive payoff. Equivalently, identical cashflows must have identical prices (the law of one price). Arbitrages disappear quickly because as soon as one is spotted, traders simultaneously buy the cheap leg and sell the expensive leg in unlimited size: buying pressure raises the cheap price, selling pressure lowers the expensive price, and the gap closes. Modern markets host high-frequency arbitrageurs whose entire business is detecting and closing these gaps in milliseconds. The practical implication: any asset-pricing relationship we can derive from no-arbitrage (e.g. forward parity, put–call parity, replicating portfolios) must hold to within transaction costs."}, {"id": "f8", "topic": "Foundations", "type": "written", "q": "What does it mean that an investor is rational? Why do we need to assume investor rationality to be able to trust stock market prices?", "a": "A rational investor (i) has well-defined preferences (typically expected utility maximization), (ii) uses all available information correctly (Bayesian updating), and (iii) acts to maximize expected utility given that information. We need this assumption to trust prices because the link between fundamentals and prices runs through investor decisions: if investors process news correctly and trade until prices reflect it, prices become unbiased estimates of fundamental value. If investors are systematically biased — overreact, anchor, herd — prices can deviate persistently from fundamentals and stop being reliable signals for the real economy (capital is misallocated, valuations of firms are wrong). Note: full individual rationality is not strictly required — as long as enough sophisticated arbitrageurs trade against mispricings, prices can still be approximately efficient."}, {"id": "f9", "topic": "Foundations", "type": "mcq", "q": "Why is the secondary market important even though it does not raise new capital for issuers?", "choices": ["It taxes investors to fund regulation", "It provides liquidity, which lowers the return investors demand at issuance", "It eliminates idiosyncratic risk for issuers", "It lets central banks set interest rates"], "correct": 1, "a": "Without a secondary market, investors holding bonds/stocks would have no easy way to exit. Knowing they can sell later, they accept a lower yield/required return when buying in the primary market — so the primary market itself becomes cheaper for issuers."}, {"id": "f10", "topic": "Foundations", "type": "mcq", "q": "Diversification reduces:", "choices": ["All risk including market risk", "Only idiosyncratic / firm-specific risk", "Only inflation risk", "Only counterparty risk"], "correct": 1, "a": "Idiosyncratic shocks average out across many holdings. Systematic (market) risk hits all assets together and remains."}, {"id": "m1", "topic": "Microstructure", "type": "written", "q": "Define market and limit orders. Explain differences between the orders and describe when they are useful.", "a": "A market order instructs the broker to execute *immediately at the best currently available price*. A limit order specifies a maximum buy price (or minimum sell price) and only executes if the market reaches that price; otherwise it sits in the order book. Differences: (i) Execution certainty — market orders almost always execute, limit orders may not. (ii) Price certainty — limit orders cap the price you pay/receive; market orders do not (they can suffer slippage in fast or thin markets). (iii) Liquidity role — market orders consume liquidity (they 'take'), limit orders supply it (they 'make'). When useful: market orders for small, urgent trades in liquid stocks where speed matters more than a few basis points; limit orders for larger trades, illiquid securities, or when you have a target price and are willing to wait."}, {"id": "m2", "topic": "Microstructure", "type": "written", "q": "Who are brokers? What is their role on the market? What is the difference between brokers and dealers?", "a": "A broker is an agent who executes trades *on behalf of clients* in exchange for a commission, and does not take the other side of the trade. A dealer (market maker) trades for *its own account*, posting bid and ask quotes and earning the spread; the dealer is the counterparty to the customer. Differences: (i) Inventory — dealers carry positions, brokers do not. (ii) Compensation — brokers earn commissions, dealers earn the bid-ask spread. (iii) Risk — dealers bear inventory and adverse-selection risk; brokers bear mainly operational/legal risk. Many large firms operate as broker-dealers, doing both depending on the order."}, {"id": "m3", "topic": "Microstructure", "type": "written", "q": "Compare differences between stock exchanges and other places. Discuss what dark pools are and how trading in dark pools differs from other places.", "a": "Stock exchanges (NYSE, Nasdaq, Oslo Børs, LSE) are *lit* venues with a public limit order book — quotes and depth are visible pre-trade and trades are reported. Other venues include OTC markets (bilateral, dealer-quoted, less transparent), ECNs/MTFs (electronic crossing networks), and dark pools. A dark pool is a venue (often run by a broker-dealer or exchange) where orders are not displayed pre-trade; trades execute typically at the midpoint of the lit-market spread and are reported afterwards. The point is to let large institutional orders execute without telegraphing intent and moving prices against them. Differences from lit venues: no pre-trade transparency, lower market-impact for big orders, but worse price discovery for the broader market and concerns about adverse selection inside the pool."}, {"id": "m4", "topic": "Microstructure", "type": "written", "q": "What are over-the-counter (OTC) markets? How does trading on such markets differ from other venues?", "a": "OTC markets are decentralised networks where securities trade bilaterally between dealers and clients rather than through a central exchange. Examples: corporate bonds, government bonds, FX, swaps, many derivatives. Differences from exchanges: (i) Decentralised, no single order book — you call (or RFQ electronically) several dealers for quotes. (ii) Lower pre-trade transparency — quotes are not necessarily public. (iii) Customisable terms — sizes, maturities, contract specs can be negotiated, useful for hedging tailored exposures. (iv) Counterparty risk is higher (bilateral, unlike exchange + central counterparty). (v) Often less liquid for retail-size, but very deep for institutional sizes in major instruments."}, {"id": "m5", "topic": "Microstructure", "type": "written", "q": "What is a bid-ask spread and which aspect of liquidity can it measure?", "a": "The bid-ask spread is the difference between the best bid (highest buy quote) and the best ask (lowest sell quote). It is the round-trip cost of trading one share immediately. As a liquidity measure it captures the *tightness* dimension — the cost of converting a small position into cash now. It does not measure depth (how big a trade can be done at the quote) or resiliency (how fast the book refills). The spread compensates dealers for order-processing costs, inventory-holding risk, and adverse selection from informed traders. Wider spreads ⇒ less liquid stock."}, {"id": "m6", "topic": "Microstructure", "type": "written", "q": "How does an investment bank earn money during the underwriting process? Does it take any risk?", "a": "In a *firm-commitment* underwriting the investment bank buys the entire issue from the firm at a discount (the *gross spread*, typically 3–7% for IPOs) and resells it to investors at the offer price; the spread is its compensation. In *best-efforts* deals the bank only earns commission on what it sells. Risk: in firm-commitment deals the bank bears price risk — if the issue cannot be fully placed at the offer price, it sits with unsold inventory and must mark down to clear, taking losses. To mitigate, banks build a book of indications of interest (book-building), syndicate with other banks, and may include a Greenshoe option to over-allot up to 15%. So yes, investment banks take meaningful underwriting risk, especially in volatile markets."}, {"id": "m7", "topic": "Microstructure", "type": "written", "q": "What are repos and reverse repos? Explain how they work and who the main participants of the repo market are.", "a": "A repurchase agreement (repo) is the sale of a security with a simultaneous agreement to buy it back at a higher price on a specified future date — economically a collateralised short-term loan, with the difference between sale and repurchase prices acting as interest (the repo rate). The cash borrower is doing a 'repo'; the cash lender is doing a 'reverse repo'. Mechanics: borrower delivers e.g. Treasury bonds, receives cash, pays it back next day (overnight repo) or longer plus interest, and receives the bond back. Main participants: dealers and banks (to fund inventory), money market funds and corporates (cash lenders), central banks (open-market operations using repos to manage reserves), and hedge funds (to lever positions). The market is huge — trillions daily in the US — and key to short-term funding and monetary policy implementation."}, {"id": "m8", "topic": "Microstructure", "type": "mcq", "q": "Which of the following is true of a market order?", "choices": ["It guarantees the price", "It guarantees execution but not the price", "It guarantees both price and execution", "It is only available in dark pools"], "correct": 1, "a": "A market order trades immediately at the best available price — execution is essentially guaranteed in a liquid market, but the actual price may differ from the last quote (slippage)."}, {"id": "m9", "topic": "Microstructure", "type": "mcq", "q": "A dealer earns its profit primarily from:", "choices": ["A flat client commission", "The bid-ask spread on its inventory", "Underwriting fees only", "Subscription fees from listed firms"], "correct": 1, "a": "Dealers post buy and sell quotes; on average they buy at the bid and sell at the ask, capturing the spread (less inventory risk and adverse-selection losses)."}, {"id": "m10", "topic": "Microstructure", "type": "mcq", "q": "Why might an institution route a large order to a dark pool?", "choices": ["To advertise the trade and attract counterparties", "To avoid pre-trade transparency and reduce market impact", "To get a guaranteed coupon", "To bypass clearing"], "correct": 1, "a": "Hiding the order pre-trade prevents other traders from front-running it; execution is typically at the lit midpoint, lowering implementation shortfall."}, {"id": "l1", "topic": "Liquidity", "type": "written", "q": "What is liquidity? Discuss three dimensions of liquidity on financial markets (Kyle's theory).", "a": "Liquidity is the ease with which an asset can be traded in size, quickly, and without moving the price. Kyle (1985) decomposed it into three dimensions: (1) Tightness — the cost of trading a small quantity, measured by the bid-ask spread; (2) Depth — the size of a trade required to move the price by a given amount, captured by the volume available at the best quotes (the inverse of Kyle's lambda); (3) Resiliency — the speed with which prices revert to fundamental value after an uninformative trade-driven shock; resilient markets bounce back as new liquidity providers post quotes. A market can be tight but shallow (good for small trades, bad for large) or deep but slow to refill (resilient liquidity matters for repeat traders)."}, {"id": "l2", "topic": "Liquidity", "type": "written", "q": "What is liquidity? Why is it difficult to measure?", "a": "Liquidity is multidimensional: cost (spread), size (depth), speed (resiliency), and immediacy. No single number captures all four, so any chosen metric is partial. Specific challenges: (i) Low-frequency proxies (Amihud illiquidity, Roll's spread estimator) are noisy. (ii) Quoted spreads understate cost when traders walk the book. (iii) Effective spreads from trade data require knowing midpoint at exact trade time. (iv) Liquidity varies across the day, by venue (lit vs dark), and by instrument. (v) It is endogenous: it depends on what other traders are doing and on the information environment, so it spikes and crashes with shocks. As a result researchers typically use a *menu* of measures (spread, Amihud, turnover, depth) rather than one."}, {"id": "l3", "topic": "Liquidity", "type": "written", "q": "In the context of commercial banks, explain what liquidity risk is and what can happen if liquidity risk materializes.", "a": "Banks fund long-dated, illiquid assets (loans, mortgages) with short-dated liquid liabilities (deposits, repo, CP). Liquidity risk is the risk they cannot meet outflows on time without fire-selling assets. It splits into *funding* liquidity risk (cannot roll the liabilities) and *market* liquidity risk (cannot sell the assets at fair value). If it materialises: (i) the bank fire-sells assets at distressed prices, generating losses that erode equity; (ii) depositors and counterparties withdraw further, accelerating the run; (iii) the bank may fail despite being economically solvent on a held-to-maturity basis (insolvency triggered by illiquidity); (iv) contagion — counterparties' losses and broader fire-sale price pressure transmit stress across the system (Northern Rock 2007, Bear Stearns 2008, SVB 2023)."}, {"id": "l4", "topic": "Liquidity", "type": "written", "q": "Explain the concept of liquidity spirals. How can they exacerbate funding problems and deepen financial crises?", "a": "Brunnermeier–Pedersen (2009) show two reinforcing spirals between *market liquidity* (cost of trading assets) and *funding liquidity* (ability of intermediaries to borrow). Loss spiral: a price drop reduces the market value of leveraged traders' assets, eroding equity; to keep leverage stable they must sell more, pushing prices further down. Margin spiral: as volatility rises, prime brokers raise haircuts/margins; traders lose funding, sell assets, prices fall, volatility rises again, margins go up further. The two spirals interact — falling market liquidity tightens funding, tighter funding kills market liquidity. This explains why crises (LTCM 1998, GFC 2008) feature sudden, system-wide liquidity evaporation rather than smooth declines."}, {"id": "l5", "topic": "Liquidity", "type": "written", "q": "What is liquidity? Discuss different dimensions of liquidity. How does it affect investors' trading and profits?", "a": "Liquidity is the ability to trade size quickly without moving prices. Dimensions: tightness (spread), depth (size at the quote), resiliency (speed of reversion), and immediacy. Effects on investors: (i) Direct cost — wider spreads and price impact eat into returns; high-turnover strategies suffer most. (ii) Risk — illiquid assets compound shocks: in a crisis you cannot exit at fair value, so realised loss > paper loss. (iii) Required return — Amihud–Mendelson show illiquid assets command a *liquidity premium*; investors demand higher expected returns for holding them. (iv) Strategy choice — informed traders prefer liquid markets to disguise their orders, while liquidity providers earn the spread but bear adverse-selection risk."}, {"id": "l6", "topic": "Liquidity", "type": "mcq", "q": "The bid-ask spread directly measures which dimension of liquidity?", "choices": ["Depth", "Tightness", "Resiliency", "Immediacy"], "correct": 1, "a": "Tightness — the cost of executing a small trade now. Depth and resiliency need additional data (book size, time-series of price/quote response)."}, {"id": "l7", "topic": "Liquidity", "type": "mcq", "q": "During a margin spiral:", "choices": ["Falling prices reduce required margins, easing funding", "Rising volatility raises haircuts, forcing more selling, raising volatility further", "Spreads narrow as liquidity providers step in", "Central-bank reserves automatically expand"], "correct": 1, "a": "Higher vol → bigger haircuts → leveraged traders can fund less → forced sales → bigger price moves → vol rises again. Brunnermeier–Pedersen 2009."}, {"id": "e1", "topic": "EMH & Anomalies", "type": "written", "q": "What is the Efficient Market Hypothesis? Describe its various forms. Can a market be semi-strong form efficient but not strong form efficient? If yes, give an example. If not, explain why.", "a": "EMH (Fama 1970) states that asset prices fully reflect available information, so investors using only that information cannot earn risk-adjusted excess returns. Three nested forms: (1) Weak form — prices reflect all *past prices and volumes*; technical analysis cannot earn abnormal returns. (2) Semi-strong — prices reflect all *publicly available* information (filings, news, analyst reports); fundamental analysis on public data cannot earn abnormal returns. (3) Strong form — prices reflect *all* information including private/insider information; even insiders cannot earn abnormal returns. Yes, a market can be semi-strong but not strong-form efficient: insiders can routinely outperform when they trade on private information. Example: corporate insiders' filings show their trades earn statistically significant abnormal returns; if the market were strong-form efficient, prices would already reflect their information and they could not. Insider trading regulation and asymmetric returns to insiders are direct evidence."}, {"id": "e2", "topic": "EMH & Anomalies", "type": "written", "q": "What does the efficient market hypothesis assume? What are its implications for stock prices and stock returns?", "a": "Assumptions: investors are rational (or arbitrageurs eliminate mispricings), information is freely and quickly available, no transaction costs that prevent arbitrage, and many competing investors trade. Implications: (i) Prices follow a random walk — predictable patterns get arbitraged away. (ii) New information moves prices instantly and unbiasedly; subsequent drift is zero. (iii) On a risk-adjusted basis, no strategy earns persistent excess returns; the average active manager underperforms a benchmark by costs. (iv) Prices are the best available estimate of fundamental value, so they are an appropriate signal for capital allocation. (v) Diversified passive investing is rational for most investors."}, {"id": "e3", "topic": "EMH & Anomalies", "type": "written", "q": "What is an abnormal return? Describe how it is related to risk and how it can be calculated. How can investors earn abnormal returns?", "a": "Abnormal return is the part of an asset's realised return that exceeds the return predicted by an asset-pricing model given its risk: AR_t = R_t − E[R_t | risk]. The benchmark E[R_t] is the *required* return for the asset's systematic risk; it is computed from a model — typically CAPM (R_f + β·MRP), Fama-French 3-/5-factor, or APT. Practically: AR_it = R_it − (R_f + β_i(R_m − R_f)) for CAPM, or = α_i from a regression. Routes to abnormal returns: (i) genuine private information (insider info, superior research), (ii) skill in processing public information faster/better than peers, (iii) bearing risks the model omits (true alpha may shrink once you add factors), (iv) behavioural exploitation when other investors are systematically biased. EMH says (i)–(iii) are rare and (iv) is arbitraged away."}, {"id": "e4", "topic": "EMH & Anomalies", "type": "written", "q": "What is a market anomaly? Define and give an example.", "a": "A market anomaly is an empirical pattern in returns that contradicts a standard asset-pricing model — i.e. an apparently predictable risk-adjusted return that EMH says should not exist. Examples: (i) Size effect — small-cap stocks historically outperform large-caps after CAPM adjustment. (ii) Value effect — high book-to-market stocks outperform low. (iii) Momentum — past 3–12 month winners continue to outperform losers. (iv) Post-earnings announcement drift — stocks continue to drift in the direction of an earnings surprise for weeks. (v) January effect, calendar effects, IPO long-run underperformance. Anomalies may indicate (a) the model is missing a risk factor (so the 'anomaly' is just compensation for risk), (b) data mining, or (c) genuine behavioural mispricing. Many anomalies have weakened after publication, consistent with arbitrage closing them."}, {"id": "e5", "topic": "EMH & Anomalies", "type": "written", "q": "What does a no-arbitrage condition mean?", "a": "No-arbitrage means there is no portfolio that requires zero net investment, has no risk in any state, and produces a positive payoff. It is weaker than full equilibrium — it just rules out free lunches. From it follow the law of one price (identical cashflows must have identical prices), put–call parity, forward parity, and the existence of risk-neutral pricing measures. Practically, any asset can be priced as the cost of a portfolio that *replicates* its cashflows; if the asset's price deviates, traders arbitrage it back."}, {"id": "e6", "topic": "EMH & Anomalies", "type": "written", "q": "Efficient markets allow us to assume observed prices are accurate estimates of firm value. Why is it otherwise difficult to value companies?", "a": "Without an efficient market giving you a credible price, you must value the firm fundamentally — typically discounting future free cashflows. That is hard because: (i) Future cashflows are uncertain and depend on growth rates, margins, capex, working capital — all forecasted. (ii) The discount rate requires a risk model and a market risk premium that are themselves estimated with wide error bars. (iii) Terminal value usually dominates DCF valuations and is extremely sensitive to long-run growth/discount-rate assumptions. (iv) Comparable-company multiples need a peer set, but no two firms are identical, and multiples themselves are anchored to market prices (circular). (v) Real-option, growth-option, and intangible-asset components are hard to model. Efficient markets short-circuit all this by aggregating thousands of analyst estimates into a single price."}, {"id": "e7", "topic": "EMH & Anomalies", "type": "mcq", "q": "Under semi-strong-form efficiency, which is true?", "choices": ["Even insiders cannot earn abnormal returns", "Past prices alone cannot predict abnormal returns", "All public information is reflected in prices, so fundamental analysis on public data does not yield abnormal returns", "Only weekly returns are predictable"], "correct": 2, "a": "Semi-strong form: all public info already in prices. Weak form is only past prices; strong form would also include private info."}, {"id": "e8", "topic": "EMH & Anomalies", "type": "mcq", "q": "Which of the following is *most consistent* with strong-form efficiency failing but semi-strong holding?", "choices": ["Index funds underperform", "Insider trades earn statistically significant abnormal returns", "Stock splits move prices", "Yields fall after rate cuts"], "correct": 1, "a": "If insiders systematically beat the market on private information, prices do not reflect *all* information — strong form fails. Public-information strategies still struggle, so semi-strong can hold."}, {"id": "ap1", "topic": "Asset Pricing", "type": "written", "q": "What is beta in the CAPM? Provide a general description as well as the formula with an explanation.", "a": "Beta measures an asset's sensitivity to movements in the market portfolio — its contribution to systematic (non-diversifiable) risk. Formula: β_i = Cov(R_i, R_m) / Var(R_m). Numerator: how the asset and market co-move. Denominator: market variance, which standardises the measure. β=1 means the asset moves one-for-one with the market on average. β>1: amplifies market moves (high systematic risk). β<1: dampens. β<0: hedges (rises when market falls). Under CAPM the expected return is E[R_i] = R_f + β_i (E[R_m] − R_f) — only beta matters for pricing, because idiosyncratic risk is diversifiable."}, {"id": "ap2", "topic": "Asset Pricing", "type": "written", "q": "What type of risk does beta measure? How is it different from stock market volatility?", "a": "Beta measures *systematic* risk — the part of an asset's volatility that is correlated with the market. Total volatility (standard deviation, σ) measures *all* return variability — systematic + idiosyncratic. Two stocks can have the same σ but very different β: a high-σ biotech with mostly firm-specific risk has lower β than a high-σ leveraged industrial whose returns track the market. CAPM rewards only β because idiosyncratic σ can be diversified away at no cost. Practically: σ matters for a single-stock investor (e.g. someone running a concentrated position), but β matters for a diversified investor pricing the asset on the margin of an already-diversified portfolio."}, {"id": "ap3", "topic": "Asset Pricing", "type": "written", "q": "What value of beta do you expect on securities that can serve as a useful hedge? What return would you expect on such securities? Explain in the context of CAPM.", "a": "A useful hedge pays off precisely when the market does badly, so it is *negatively* correlated with the market and therefore has β<0 (or at least very low β). CAPM says E[R_i] = R_f + β_i(E[R_m] − R_f), so with β<0 the expected return is *below* the risk-free rate. The intuition: investors are willing to accept a low (even negative excess) return on assets that pay off in bad states, because such assets reduce portfolio risk. Examples sometimes cited: gold, certain put options, long-dated Treasuries during equity sell-offs, the VIX. The cost of insurance is the negative risk premium."}, {"id": "ap4", "topic": "Asset Pricing", "type": "written", "q": "What is an asset pricing model and why is it useful? How are risk factors defined in Arbitrage Pricing Theory (APT)?", "a": "An asset pricing model relates an asset's expected return to its exposures to systematic risk factors and the price of those risks: E[R_i] = R_f + Σ β_ik · λ_k. It is useful for (i) computing required returns / discount rates for valuation, (ii) measuring abnormal performance (alpha), (iii) estimating the cost of capital, (iv) constructing benchmarks. APT (Ross 1976) is more general than CAPM: it derives expected returns from no-arbitrage rather than mean-variance equilibrium, and allows *multiple* factors. Factors are not specified by the theory — they are any pervasive sources of systematic risk: macro variables (industrial production, inflation surprises, term spreads, default spreads) or empirical factors (size, value, momentum, profitability — as in Fama-French). β_ik is asset i's sensitivity to factor k; λ_k is the risk premium for one unit of factor-k exposure."}, {"id": "ap5", "topic": "Asset Pricing", "type": "written", "q": "What is a Capital Market Line? Explain in words and write a formula. Why is a lower Sharpe ratio a sign of a worse investment?", "a": "In CAPM equilibrium, the Capital Market Line (CML) is the set of efficient portfolios obtained by combining the risk-free asset with the tangency (market) portfolio. Formula: E[R_p] = R_f + ((E[R_m] − R_f)/σ_m) · σ_p. Slope = market Sharpe ratio = compensation per unit of total risk. Every efficient portfolio lies on the CML and shares the same Sharpe ratio as the market. Sharpe ratio (E[R]−R_f)/σ measures excess return per unit of total risk. A lower Sharpe means you are bearing more risk for the same expected return — a less efficient use of risk capacity. By combining the higher-Sharpe asset with the risk-free rate you could replicate the lower-Sharpe asset's expected return at *less* risk, so the lower-Sharpe asset is dominated."}, {"id": "ap6", "topic": "Asset Pricing", "type": "written", "q": "What is a Sharpe ratio and how do you compute it? Are portfolios with higher Sharpe ratios better? Why or why not?", "a": "Sharpe = (E[R_p] − R_f) / σ_p — excess return per unit of total volatility. Higher Sharpe is generally better for a *standalone* investment because for any target expected return you can get there with less risk by levering the high-Sharpe portfolio (or for any target risk you get higher expected return). Caveats: (i) Sharpe penalises *all* volatility including upside; for skewed payoffs (options, hedge funds) Sortino or related ratios are better. (ii) Sharpe is sensitive to the sample period and to leverage. (iii) For a single asset added to a *diversified* portfolio, marginal contribution to portfolio Sharpe (i.e. β-adjusted alpha) is what matters, not standalone Sharpe. (iv) Tail risk and illiquidity can flatter Sharpe spuriously."}, {"id": "ap7", "topic": "Asset Pricing", "type": "calc", "q": "CAPM: R_f = 1.5%, E[R_m] = 7%, σ_m = 30%. Securities A (E[R]=4%, σ=14.25%), B (E[R]=9%, σ=45.5%), C (E[R]=5%, σ=19.09%). (i) Compute each Sharpe. (ii) Which lies on the CML?", "a": "Sharpe = (E[R]−R_f)/σ. Market Sharpe = (7%−1.5%)/30% = 5.5/30 = 0.1833. A: (4−1.5)/14.25 = 2.5/14.25 = 0.1754 → not on CML. B: (9−1.5)/45.5 = 7.5/45.5 = 0.1648 → not on CML. C: (5−1.5)/19.09 = 3.5/19.09 = 0.1833 → equal to market Sharpe → C lies on the CML. Interpretation: only C is efficient — its risk/reward matches the market's. A and B are dominated; you could combine R_f and the market to beat them."}, {"id": "ap8", "topic": "Asset Pricing", "type": "calc", "q": "CAPM: R_f = 2%, E[R_m] = 7%, σ_m = 40%. Portfolio A is on the CML and has E[R_A] = 9%. Find σ_A, Sharpe of A, and whether other portfolios share A's Sharpe.", "a": "On the CML, Sharpe_A = market Sharpe = (7%−2%)/40% = 0.125. From E[R_A] = R_f + Sharpe·σ_A: 9% = 2% + 0.125·σ_A ⇒ σ_A = 7%/0.125 = 56%. So σ_A = 56%, Sharpe = 0.125. Other portfolios with the same Sharpe: yes — every portfolio on the CML has the same Sharpe, because they are all (R_f + market) combinations differing only in the leverage of the market position. The market portfolio itself, leveraged or de-levered, all have Sharpe 0.125 too."}, {"id": "ap9", "topic": "Asset Pricing", "type": "calc", "q": "APT factor model: market premium 12%, momentum 8%, liquidity 4.5%. Stock A has β_M=0.8, β_MOM=1.4, β_LIQ=−0.4, R_f=1.5%. Realised return R_A = 22%. Find the equilibrium expected return and decide if A is over/under-priced.", "a": "E[R_A] = R_f + β_M·λ_M + β_MOM·λ_MOM + β_LIQ·λ_LIQ = 1.5% + 0.8·12% + 1.4·8% + (−0.4)·4.5% = 1.5 + 9.6 + 11.2 − 1.8 = 20.5%. Realised 22% > equilibrium 20.5% by 1.5 percentage points. Higher realised than required ⇒ the asset is priced *too low* (you earn more than risk justifies) ⇒ stock A is **under-priced**. Buying it would be attractive. (Alternative phrasing: positive APT alpha.)"}, {"id": "ap10", "topic": "Asset Pricing", "type": "calc", "q": "CAPM: R_f = 1%, E[R_m] = 12%. Stocks: A (E[R]=14%, β=1.2), B (E[R]=11%, β=0.9), C (E[R]=20%, β=1.8). (i) Risk premium on A. (ii) Which stocks are undervalued? (iii) Which would you buy and why?", "a": "Required E[R] = R_f + β(E[R_m]−R_f) = 1% + β·11%. (i) Risk premium on A = β_A · MRP = 1.2 · 11% = 13.2%, so required E[R_A] = 14.2%; actual 14%, premium *received* over R_f = 13%. (ii) Compare actual vs required: A required 14.2% vs actual 14% → over-priced (alpha = −0.2%). B required 1+0.9·11 = 10.9% vs actual 11% → under-priced (alpha = +0.1%). C required 1+1.8·11 = 20.8% vs actual 20% → over-priced (alpha = −0.8%). (iii) Buy B — it is the only stock with positive alpha, i.e. the only one offering more return than its systematic risk warrants under CAPM."}, {"id": "ap11", "topic": "Asset Pricing", "type": "mcq", "q": "In CAPM, an asset with β = 0:", "choices": ["Earns the market return", "Earns the risk-free rate", "Has zero variance", "Is impossible to construct"], "correct": 1, "a": "E[R] = R_f + 0·MRP = R_f. Zero β means no systematic risk, so no premium. The asset can still have non-zero idiosyncratic σ; β=0 says nothing about variance."}, {"id": "b1", "topic": "Bonds & Yield Curve", "type": "written", "q": "What is a bond? Provide its definition and discuss at least four characteristics.", "a": "A bond is a debt security in which the issuer (government, corporation, agency) borrows from investors and contractually promises to pay periodic coupons and return the face (par) value at maturity. Key characteristics: (1) Face value (principal) — amount repaid at maturity, often $1,000 or $100. (2) Coupon — periodic interest, fixed or floating, expressed as % of face. (3) Maturity — date of principal repayment; short (≤1y), medium, long (10y+). (4) Yield — the discount rate that equates the bond's price to its cashflows; YTM is the standard measure. (5) Issuer credit quality / default risk — rated by agencies (S&P, Moody's, Fitch). (6) Embedded options — callable, putable, convertible. (7) Seniority/security — senior secured, senior unsecured, subordinated; affects recovery in default."}, {"id": "b2", "topic": "Bonds & Yield Curve", "type": "written", "q": "What is a callable bond? If a company issues two identical bonds, but one is callable and the other is not, which has the higher yield? Explain. When is a bond usually called?", "a": "A callable bond gives the *issuer* the right to redeem the bond before maturity at a pre-specified call price (often par). The callable bond has the *higher* yield. Reason: the call option benefits the issuer at the investor's expense — when interest rates fall (or the issuer's credit improves), the issuer calls and refinances cheaper, leaving the investor to reinvest at lower rates (negative convexity). Investors require extra yield as compensation. Bonds are typically called when (i) market interest rates have fallen meaningfully below the coupon rate, (ii) the issuer's credit spread has tightened, or (iii) the issuer wants to remove restrictive covenants or change capital structure. In each case, the call is exercised when the bond's market value would otherwise exceed the call price."}, {"id": "b3", "topic": "Bonds & Yield Curve", "type": "written", "q": "What is a convertible bond? If a company issues two identical bonds, one convertible and one not, which has the higher yield? Why?", "a": "A convertible bond gives the *holder* the right to exchange the bond for a fixed number of the issuer's shares. It bundles a straight bond with a long equity call option. The non-convertible (straight) bond has the *higher* yield. Reason: the conversion option benefits the *investor* — they participate in the equity upside if the share price rises while keeping bond-like downside if it doesn't. Investors are willing to accept a lower coupon in exchange for that option. From the issuer's perspective, convertibles raise capital cheaply but at the cost of potential dilution. The yield gap between identical convertible and straight bonds equals the value of the embedded call."}, {"id": "b4", "topic": "Bonds & Yield Curve", "type": "written", "q": "What is yield to maturity? What is the relationship between yield to maturity, interest rates, bond prices, and coupons?", "a": "YTM is the single discount rate that makes the present value of a bond's promised cashflows equal to its current market price. It is the IRR of holding the bond to maturity, assuming all coupons are reinvested at YTM and no default. Relationships: (i) Price ↔ YTM are *inversely* related — higher YTM ⇒ lower price. (ii) When market interest rates rise, YTMs of existing bonds rise to match (otherwise no one would buy them), which pushes prices down. (iii) Coupon vs YTM: coupon > YTM ⇒ bond trades at *premium* (above par); coupon < YTM ⇒ *discount*; coupon = YTM ⇒ at par. (iv) Sensitivity (duration) is larger for low-coupon and longer-maturity bonds — they are more interest-rate sensitive. (v) Credit deterioration raises required yield and lowers price."}, {"id": "b5", "topic": "Bonds & Yield Curve", "type": "written", "q": "What is default risk? How can we measure it? Discuss how bond yields are related to default risk.", "a": "Default risk is the risk that the issuer fails to pay promised coupons or principal in full and on time. Measurement: (i) Credit ratings (Moody's, S&P, Fitch) — ordinal but informative. (ii) Credit spreads = corporate yield − comparable-maturity government yield; rises with perceived risk. (iii) Probability of default models — structural (Merton: equity as call on assets) and reduced-form (intensity models calibrated to spreads). (iv) CDS premia, which directly price the cost of insuring against default. Yield ↔ default risk: higher default risk ⇒ higher promised yield, because investors demand a default premium = expected loss + risk premium for default risk being correlated with bad states. The yield curve for risky issuers lies above the riskless curve and widens in stress periods."}, {"id": "b6", "topic": "Bonds & Yield Curve", "type": "written", "q": "Discuss the key features of the liquidity preference hypothesis of the term structure (no formulas needed). Assuming the hypothesis is true, what can we learn from an upward-sloping yield curve? Explain how conclusions depend on the term premium.", "a": "Liquidity preference theory (Hicks): investors prefer holding short-dated bonds because they bear less interest-rate risk; to induce them to hold longer maturities issuers must pay a positive *term premium*. So long forward rates equal expected short rates *plus* a term premium that grows with maturity. Implications for an upward-sloping curve: a rising curve does *not* unambiguously mean the market expects rates to rise — part of the slope is the term premium itself. If the term premium is small, an upward slope mostly reflects expectations of rising short rates (e.g. tightening cycle). If the term premium is large, the curve can slope up even when short rates are expected to be flat or falling. Hence, to back out market rate expectations from the curve, you must subtract a term-premium estimate (e.g. ACM, Kim-Wright models)."}, {"id": "b7", "topic": "Bonds & Yield Curve", "type": "written", "q": "Briefly describe the market segmentation theory of the term structure. Assuming this theory is true, when could a yield curve become flatter?", "a": "Market segmentation theory: investors and borrowers have strong maturity preferences (e.g. pension funds want long bonds to match liabilities; banks want short paper) and do not freely substitute across maturities. Consequently, the yield at each maturity is determined by the supply and demand *within* that segment, largely independent of other segments. Yield curve flattens when shifts in supply/demand reduce the gap between short and long yields: e.g. (i) heavy long-end demand from pension/insurance buyers (driving long yields down) combined with heavy short-end issuance (driving short yields up), or vice versa; (ii) a central bank's QE buying long bonds (long yields fall) while short-rate expectations stay the same — but in pure segmentation, signals do not transmit, so the trigger is segment-specific flow."}, {"id": "b8", "topic": "Bonds & Yield Curve", "type": "written", "q": "Explain the market segmentation hypothesis of the yield curve.", "a": "Market segmentation views the term structure as a collection of independent markets, one per maturity bucket. Each segment has its own clientele: short-end (banks, money market funds), medium (corporates managing working capital), long-end (pension funds, insurers, foreign reserve managers). Yields in each bucket are set by local supply and demand, with limited arbitrage between them because of regulatory, liability-matching, or risk-tolerance constraints. The shape of the yield curve therefore reflects the relative scarcity of supply/demand at each maturity rather than coherent market-wide expectations of future rates. The theory explains persistent demand-driven distortions (e.g. ultra-long-end yields below short-end during reach-for-yield episodes) but is criticised because in practice substitution does occur — pure segmentation overstates compartmentalisation."}, {"id": "b9", "topic": "Bonds & Yield Curve", "type": "written", "q": "Assume the expectation hypothesis is true. Discuss how short term and longer term interest rates are related under this hypothesis.", "a": "Pure expectations hypothesis: long yields are the geometric average of expected future short rates over the bond's life; investors are risk neutral about maturity, so no term premium. Implications: (i) An upward-sloping curve ⇒ market expects rising short rates. (ii) Inverted curve ⇒ expects falling short rates (often a recession signal). (iii) Forward rates extracted from the curve = unbiased forecasts of future spot rates. (iv) Holding-period returns are equal in expectation across maturities — you cannot earn a premium by riding the curve. Empirically the pure form is rejected (term premia exist), but it remains a useful benchmark and the basis for forward-rate calculations."}, {"id": "b10", "topic": "Bonds & Yield Curve", "type": "calc", "q": "Two-year zero-coupon bond, face value $100, two-year spot yield 3.2%. (a) Bond price? (b) If yield were 3% but bond paid an annual 3% coupon, would the price be higher or lower? Compute.", "a": "(a) P = 100 / 1.032² = 100 / 1.065024 = $93.89. (b) Cashflows: $3 at t=1, $103 at t=2. Discount at 3%: P = 3/1.03 + 103/1.03² = 2.9126 + 97.0874 = $100.00. Higher than $93.89. The coupon bond at par yield (coupon = yield) prices to par, while the zero-coupon at 3.2% yield trades at a discount. So yes — the coupon bond is more expensive."}, {"id": "b11", "topic": "Bonds & Yield Curve", "type": "calc", "q": "Two-year coupon bond, face $100, coupon 4%, one-year spot 2.8%, two-year spot 3.2%. (a) Price? (b) If coupon were 5%, higher or lower price?", "a": "(a) Cashflows: $4 at t=1, $104 at t=2. Discount with relevant spot rates: P = 4/1.028 + 104/1.032² = 4/1.028 + 104/1.065024 = 3.8911 + 97.6505 = $101.54. (b) Higher coupon ⇒ higher cashflows ⇒ higher price (yields are unchanged). Quick check: P = 5/1.028 + 105/1.065024 = 4.8638 + 98.5894 = $103.45. Yes, ≈$1.91 higher per $100 face."}, {"id": "b12", "topic": "Bonds & Yield Curve", "type": "calc", "q": "Expectations hypothesis. Spot rates: 1y=0.8%, 2y=0.96%, 3y=1.02%, 4y=1.04%, 5y=1.11%. What is the future one-year spot rate expected in two years (i.e. f₃ from year 2 to year 3)?", "a": "Under EH, (1+s_3)³ = (1+s_2)² · (1+f). So f = (1+s_3)³/(1+s_2)² − 1 = 1.0102³ / 1.0096² − 1 = 1.030906/1.019292 − 1 = 1.011394 − 1 = **1.139%**. The market expects a one-year rate of about 1.14% to prevail in two years' time."}, {"id": "b13", "topic": "Bonds & Yield Curve", "type": "calc", "q": "Liquidity preference. Spot rates: 1y=0.9%, 2y=1.2%, 3y=1.35%. Expected one-year short rates: 1.1% (in 1y) and 1.15% (in 2y). Compute the liquidity premium for a two-year bond.", "a": "Under LP theory, (1+s_2)² = (1+s_1)·(1+E[s_1 in 1y]) · (1+L_2) approximation; commonly: 2·s_2 ≈ s_1 + E[s_1 in 1y] + L_2 (using continuous/linear approximation). Linear: 2·1.2% = 0.9% + 1.1% + L_2 ⇒ 2.4 = 2.0 + L_2 ⇒ **L_2 = 0.4%** per year (annualised). Equivalent geometric: (1.012)² = (1.009)(1.011)(1+L) ⇒ 1.024144/(1.009·1.011) − 1 = 1.024144/1.020099 − 1 = 0.397% ≈ 0.4%. Either way, liquidity premium for the 2-year ≈ 40 bps."}, {"id": "s1", "topic": "Stocks & IPOs", "type": "written", "q": "What is a stock? Define and characterize. List and explain at least five characteristics.", "a": "A stock (share, equity) is a security representing fractional ownership in a corporation, giving the holder a residual claim on the firm's assets and cashflows after debt and other senior claims. Characteristics: (1) Residual claim — equity is paid last in liquidation, only after creditors. (2) Limited liability — shareholders can lose at most their investment, not personal assets. (3) Voting rights — common shareholders typically vote on directors and major decisions; preferred often have no votes. (4) Dividends — discretionary payments; not contractually guaranteed (unlike coupons), and can be omitted. (5) Indefinite life — no maturity; the security exists as long as the firm does. (6) Liquidity — listed shares trade continuously at observable prices. (7) Capital gains — main return source for many investors via price appreciation; taxed differently than dividends in many jurisdictions. (8) Corporate-control market — shares confer the ability to influence the firm via takeovers, proxy fights."}, {"id": "s2", "topic": "Stocks & IPOs", "type": "written", "q": "Compare bond and stock markets. Discuss in detail at least five aspects.", "a": "(1) Claim — bonds are senior debt with a contractual cashflow (coupon + principal); stocks are residual equity with no guaranteed payment. (2) Risk/return profile — equities have higher expected return and higher volatility; bonds typically lower of both, except deep-distressed credit. (3) Maturity — bonds have a fixed maturity (3m T-bill to 30y+); stocks are perpetual. (4) Investor base — bonds dominated by institutional buyers (insurers, pension funds, central banks, money market funds); equity has much heavier retail participation. (5) Trading — most bonds trade OTC bilaterally with dealers and limited transparency; stocks mainly on lit exchanges with continuous price discovery. (6) Market size — global bond market is larger than equity market by outstanding value (≈$130T vs ≈$110T). (7) Tax treatment — interest is typically tax-deductible to the issuer; dividends are not, creating a tax bias toward debt. (8) Voting/control — equity carries votes; debt does not (until default, when creditors gain control rights through restructuring)."}, {"id": "s3", "topic": "Stocks & IPOs", "type": "written", "q": "Why is it difficult to come up with an IPO price? Discuss the problems of IPO underpricing and overpricing.", "a": "Pricing an IPO is hard because there is no market history for the stock — no observable demand curve, no comparable trading record, and the issuer has more information about its prospects than investors (asymmetric information). The bank must combine DCF, comparable multiples, book-building demand, and market sentiment, all of which are noisy. Underpricing (offer price < first-day close) is empirically the norm (~15% average first-day pop). Costs to the issuer: 'money left on the table' — the firm could have raised more capital at a higher price; existing shareholders are diluted at too low a price. Overpricing means the offer cannot fully sell at the offer price; the IPO 'breaks' below offer. Costs: bank reputational and inventory loss in firm-commitment deals; for the issuer, signals weak demand, depresses post-IPO trading, complicates future capital raises, and can damage investor relations. From the firm's perspective overpricing is generally worse — underpricing is a wealth transfer to first-day buyers but the firm still raised capital and built a successful trading debut, while overpricing imperils the offering itself and stigmatises the stock."}, {"id": "s4", "topic": "Stocks & IPOs", "type": "written", "q": "Explain how IPOs are priced. Discuss why underpricing and overpricing are disadvantageous. Which is worse from the firm perspective? Justify.", "a": "IPO pricing combines (i) DCF and comparable-multiples valuation to set a preliminary range, (ii) book-building — the lead bank takes indications of interest from institutional investors during a roadshow and observes demand at various prices, and (iii) final pricing the night before listing using bookbuild data and market conditions. The price often sits within or below the indicative range. Underpricing wastes capital — the firm sells too cheaply and the gain accrues to first-day buyers, not the issuer or pre-IPO shareholders. Overpricing means the issue does not fully clear; bank inventory accumulates, the stock breaks below offer, and the firm's reputation in capital markets suffers. From the firm's perspective, **overpricing is worse**: a botched IPO can cause the offering to be pulled, harms ongoing capital-raising ability, and the post-IPO trading damage is hard to undo. Underpricing, while expensive, leaves the firm publicly listed with a successful debut and easier follow-on access. Many issuers therefore tolerate moderate underpricing as 'insurance' against the much costlier outcome of a failed IPO."}, {"id": "s5", "topic": "Stocks & IPOs", "type": "calc", "q": "Rights issue: 1 new share at $12 for every 4 held. 30 million shares outstanding before, share price $14. All rights exercised. (a) Total new money raised? (b) Theoretical ex-rights price? (c) Value of one right (to buy one new share)?", "a": "(a) New shares issued = 30m / 4 = 7.5m shares × $12 = **$90 million** new money. (b) Value before issue = 30m·$14 = $420m. After: $420m + $90m = $510m total equity, divided over 30m + 7.5m = 37.5m shares ⇒ $510m/37.5m = **$13.60** per share theoretical ex-rights price. (c) Value of one right: a holder pays $12 to receive a share worth $13.60 ⇒ each new share is worth $1.60 above its subscription price. Since one new share requires 4 existing rights, the per-right value = $1.60 / 4 = **$0.40** (or alternatively, the per-new-share right value = $1.60). Both interpretations are accepted; quote both for clarity."}, {"id": "s6", "topic": "Stocks & IPOs", "type": "mcq", "q": "From the issuing firm's perspective, IPO overpricing is generally worse than underpricing because:", "choices": ["The firm has to repay first-day buyers", "An overpriced IPO can break syndicate, fail to clear, and damage future capital raising", "Underpricing is illegal", "Overpricing increases tax liability"], "correct": 1, "a": "Underpricing leaves money on the table but the firm still goes public successfully. Overpricing risks a failed offering and lasting reputational and access damage."}, {"id": "int1", "topic": "Interest Rates", "type": "written", "q": "What is an interest rate? Explain the difference between a nominal and real interest rate.", "a": "An interest rate is the price of borrowing or lending money over time, expressed as a percentage per period. Nominal interest rate: the stated rate, in current units of currency. Real interest rate: the nominal rate adjusted for inflation — what you actually earn in purchasing power. Fisher equation (approx): real ≈ nominal − expected inflation; exactly: 1 + real = (1 + nominal)/(1 + inflation). Why it matters: economic decisions (consumption, investment, savings) depend on real returns, not nominal ones. A 5% nominal return when inflation is 4% leaves only ~1% in extra purchasing power."}, {"id": "int2", "topic": "Interest Rates", "type": "written", "q": "Why are real interest rates difficult to measure?", "a": "Real rate = nominal rate − *expected* inflation (ex ante). Expected inflation is unobservable — it lives in households' and firms' heads. Three measurement approaches each have problems: (i) Use realised inflation as a proxy (ex post real rate) — but ex post ≠ ex ante because inflation surprises systematically bias the estimate. (ii) Survey expectations (Michigan, SPF) — small samples, slow updating, possibly biased. (iii) Inflation-linked securities (TIPS) yield differential vs nominal — gives a market 'breakeven', but contaminated by inflation-risk premium and TIPS liquidity premium. Furthermore, the relevant inflation differs by household (CPI, PCE, sector-specific baskets), so the 'real rate' is not even a single number. So all three measures move together but rarely agree precisely."}, {"id": "int3", "topic": "Interest Rates", "type": "written", "q": "Explain the evolution of inflation in the past few years. How has it evolved, what are the potential reasons and prospects?", "a": "Through 2010–2019 inflation in advanced economies sat persistently below 2%, prompting QE and zero-rate policy. From 2021 inflation surged sharply: US CPI peaked at 9.1% in mid-2022; Eurozone HICP at 10.6% in Oct 2022; Norway CPI peaked above 7%. Drivers were (i) supply-side — pandemic shutdowns, supply-chain disruptions, energy and commodity shock from the Russia-Ukraine war; (ii) demand-side — large fiscal stimulus and pent-up consumer demand from reopening; (iii) labour markets — tight, with above-target wage growth in services. Central banks (Fed, ECB, BoE, Norges Bank) responded with the fastest hiking cycle in decades from 2022. By 2024–25 headline inflation had largely come down toward target ranges (US ≈3%, Eurozone ≈2–3%, Norway near 3%) as supply normalised and policy bit, although core/services inflation has been stickier. Prospects: most central banks moved toward gradual rate cuts in 2024–25 as inflation trended toward target, but with significant uncertainty around tariffs, energy prices, and wage dynamics."}, {"id": "int4", "topic": "Interest Rates", "type": "written", "q": "What is an interest rate? What determines interest rates? Discuss three categories of factors moving interest rates. Note when they move rates up and when down.", "a": "An interest rate is the price of money over time. Three categories of drivers: (1) **Real economic factors / loanable funds**: stronger growth and investment opportunities raise demand for funds and push rates up; higher household savings increase supply and push rates down; demographics (more savers) push rates down; productivity shocks raise rates. (2) **Inflation expectations**: higher expected inflation raises nominal rates via Fisher (lenders demand compensation); falling inflation expectations lower rates. (3) **Monetary policy and risk premia**: hawkish central banks raise short rates; QE compresses long rates and term premia; risk-off episodes push safe rates down (flight to quality) but credit spreads up. Other inputs — liquidity preference, government deficits (more borrowing → higher rates), foreign demand for safe assets (lowers rates), and credit risk — feed into segments of the curve."}, {"id": "int5", "topic": "Interest Rates", "type": "written", "q": "In the loanable funds theory, discuss what happens with interest rates when the economy enters expansion. Support with a plot.", "a": "Loanable funds: the equilibrium interest rate is set where supply of funds (from savers, foreign investors) meets demand for funds (from firms investing, households borrowing, governments). In expansion: (i) firms see better investment opportunities and demand more funds — *demand curve shifts right*; (ii) household incomes rise so saving may also rise, but typically by less than investment demand, so *supply shift is smaller*. Net effect: equilibrium quantity of borrowing rises and the equilibrium real interest rate rises. Plot: rate (i) on vertical axis, quantity (Q) on horizontal; upward-sloping S, downward-sloping D; D shifts right to D'; new equilibrium at higher i and higher Q. In contraction the opposite: D shifts left, rates fall."}, {"id": "mf1", "topic": "Mutual Funds", "type": "written", "q": "Define and compare passive and active mutual fund strategies. List and explain at least five characteristics.", "a": "Passive: tries to *match* a benchmark index by holding it (or a representative sample). Active: tries to *beat* a benchmark via security selection, market timing, or factor tilts. Five contrasts: (1) Objective — match vs beat benchmark. (2) Costs — passive ~0.03–0.20% TER; active 0.7–2% plus possibly performance fees and turnover costs. (3) Turnover — passive low (only rebalancing for index changes); active higher, with associated trading costs and tax drag. (4) Returns vs benchmark — passive: benchmark minus fees; active: dispersion around benchmark, with average of after-fee active returns close to benchmark minus higher fees (SPIVA reports show ~80% of active managers underperform over 10y). (5) Tracking error — passive low and intentional; active higher, sometimes deliberately. (6) Manager skill / persistence — limited evidence active outperformance persists beyond luck (Carhart 1997). (7) Use case — passive suits long-horizon diversified investors; active may suit niche / inefficient asset classes (small-cap, EM debt, distressed)."}, {"id": "mf2", "topic": "Mutual Funds", "type": "written", "q": "Discuss differences between active and passive strategies. List and explain at least five characteristics.", "a": "Same comparison as above. Five aspects: (1) Goal — replicate index vs outperform it. (2) Cost structure — passive cheap, active expensive; on average the cost gap is the principal driver of after-fee underperformance of active. (3) Manager intervention — passive minimal, automated; active discretionary. (4) Risk — passive equals index risk; active introduces manager risk and can be more concentrated. (5) Information used — passive uses none beyond index composition; active uses fundamental and quantitative analysis. (6) Liquidity and capacity — passive scales well; many active strategies suffer capacity constraints (small-cap, illiquid niches). (7) Tax efficiency — passive lower turnover ⇒ fewer realised capital gains for taxable investors."}, {"id": "mf3", "topic": "Mutual Funds", "type": "written", "q": "What is a passive investment strategy? Describe differences in characteristics between passive and active strategies (at least 4).", "a": "A passive strategy holds a portfolio designed to track a chosen index and accepts the index return; no security selection or market timing. Differences vs active: (1) Costs (passive cheap, active costly); (2) Performance objective (match vs beat); (3) Turnover (low vs high); (4) Persistence of returns (passive predictably tracks index; active managers rarely beat consistently). Additional: (5) Information requirements (none vs intensive research), (6) Tax drag (lower vs higher), (7) Tracking error (small vs large)."}, {"id": "mf4", "topic": "Mutual Funds", "type": "written", "q": "What is a passive strategy? When is it NOT useful?", "a": "Passive replicates an index. It is *less* useful when: (i) The asset class is genuinely inefficient and well-resourced active managers can persistently exploit it (some private credit, distressed debt, frontier markets, certain illiquid alternatives). (ii) No good index exists or the index is poorly constructed (e.g. some bond indices are weighted by debt outstanding, so you mechanically buy more of the most indebted issuers). (iii) The investor needs liability matching (LDI for pension funds) — they need a tailored portfolio of cashflows, not a market-cap index. (iv) ESG / personal restrictions exclude index components and tracking error becomes large. (v) The benchmark itself is concentrated (e.g. extreme mega-cap dominance) and this concentration creates undesirable risk for the investor. (vi) Tax overlay or tactical rebalancing has more value than benchmark replication. In most other cases — long-horizon, diversified, fee-sensitive — passive dominates."}, {"id": "mf5", "topic": "Mutual Funds", "type": "written", "q": "What return can one expect from an active strategy ON AVERAGE? Explain why.", "a": "On average, the active investor earns the *benchmark return minus active fees and trading costs*. This is the Sharpe arithmetic-of-active-management argument: collectively all active and passive investors hold the market, so before costs the *average* active dollar earns the market return; after subtracting higher active fees and turnover, the average active dollar must underperform the average passive dollar. Empirically (SPIVA, Morningstar), 70–85% of active equity funds underperform their benchmarks over 10–15 year horizons. Some funds beat — but identifying them ex ante is difficult, and persistence beyond luck is weak. Hence the rational default for most investors is passive, with active reserved for inefficient corners."}, {"id": "mf6", "topic": "Mutual Funds", "type": "written", "q": "Can a skilled manager maintain good performance (measured by returns) in the long run? Explain why or why not.", "a": "Hard to do, for several reasons: (1) **Diminishing returns to scale** (Berk-Green 2004) — once a manager shows skill, capital flows in; the larger fund faces higher market-impact costs trading the same ideas, eroding alpha until it disappears at the margin. (2) **Information competition** — others copy the strategy or compete for the same trades. (3) **Style drift / luck mean-reversion** — apparent persistence often is luck; statistically, controlling for factor exposures, only ~3% of active funds show alpha distinguishable from luck (Fama-French 2010). (4) **Career risk** — managers who deviate from benchmarks may be fired during drawdowns even if their long-run process is sound. So a *truly* skilled manager can keep producing alpha but the size of the fund she can run while doing so is bounded — implying her *firm* may stay great while *fund returns to investors* converge to benchmark."}, {"id": "mf7", "topic": "Mutual Funds", "type": "written", "q": "What is the relationship between the size of a mutual fund and the returns it generates? Is size helpful in predicting future performance and assessing managers' skill?", "a": "Empirical literature (Chen, Hong, Huang, Kubik 2004; Berk-Green 2004) finds that fund size and gross alpha are *negatively* related at the fund level: as funds grow, market impact rises and small profitable trades become uneconomic, so alpha shrinks. Size predicts *future* performance modestly — large funds tend to underperform their smaller peers in the same style (especially in small-cap and illiquid asset classes). Size is a poor *direct* signal of skill, however: skilled managers attract inflows precisely *because* they showed past skill, so a large fund is consistent with both 'currently skilled but capacity-constrained' and 'past skill, current alpha eroded'. Better skill metrics are factor-adjusted alpha, R² (lower R² often indicates active bets), and active share, all measured over long windows."}, {"id": "mf8", "topic": "Mutual Funds", "type": "written", "q": "'A mutual fund is managed by highly-skilled managers if it reports high abnormal returns.' TRUE or FALSE? Explain.", "a": "**FALSE / partially false.** Reasons: (1) High realised abnormal returns can be *luck* — even if true skill is zero, in any cross-section of thousands of funds some will post large positive alphas just by chance (Fama-French 2010). (2) Reported alpha may be miscomputed: missing risk factors (size, value, momentum, profitability, market-beta time variation) means apparent alpha is in fact compensation for risk. (3) Survivorship bias inflates measured fund returns — failed funds disappear from databases. (4) Backfill bias and incubation: families launch many small funds, kill the bad ones, and market the survivors with their full returns history. (5) Even genuine skill is hard to attribute to *managers* (vs firm research infrastructure, vs lucky factor tilts). To call a manager 'skilled' requires risk-adjusted, factor-controlled, long-horizon, survivorship-adjusted evidence — not a single high return number."}, {"id": "fi1", "topic": "Financial Intermediaries", "type": "written", "q": "What is asset transformation and what purpose does it serve? What is the asset transformation function of Financial Institutions?", "a": "Asset transformation is the process by which a financial institution issues *liabilities* with one set of characteristics and uses the proceeds to acquire *assets* with different characteristics, mismatching the two on dimensions that benefit each side. Purposes: (1) **Maturity transformation** — short-term deposits funding long-term loans. (2) **Size / denomination transformation** — many small deposits funding a few large loans. (3) **Risk transformation** — diversified, monitored loan portfolio backed by relatively safe deposits (with deposit insurance). (4) **Liquidity transformation** — illiquid loans backed by liquid demandable claims. The economic value: borrowers get tailored long-term, large, customised credit; savers get safe, small, liquid claims; both benefit. Risks: this creates fragility (bank runs, liquidity risk) which is why banks are regulated and have access to the central bank lender of last resort."}, {"id": "fi2", "topic": "Financial Intermediaries", "type": "written", "q": "What is indirect finance? Discuss the role of financial intermediaries in indirect finance. Mention asset transformation.", "a": "Indirect finance: savers' funds reach borrowers *via* a financial intermediary (bank, insurer, fund) rather than through securities sold directly in markets. The intermediary stands between the two parties on its own balance sheet, taking deposits / premiums and making loans / investments. Roles: (i) reduce information asymmetries by screening and monitoring borrowers; (ii) pool savings, allowing scale; (iii) diversify across many loans, reducing idiosyncratic risk; (iv) provide payment services; (v) **asset transformation** — convert risky, illiquid, large, long-dated assets into safe, liquid, small, short-dated liabilities, which is what makes saving accessible to ordinary households. Direct finance (issuing bonds/equities) is cheaper for large firms with reputations; indirect finance dominates for smaller borrowers and households."}, {"id": "fi3", "topic": "Financial Intermediaries", "type": "written", "q": "What do financial intermediaries do to help increase the flow of funds in the economy? List at least three factors.", "a": "(1) **Reduce transaction costs** by pooling many small savers and making large loans (economies of scale and scope in loan origination, payments, custody). (2) **Reduce information asymmetries** through screening (assessing creditworthiness) and monitoring (ensuring borrowers behave) — this addresses adverse selection and moral hazard, allowing credit to flow to borrowers it would not reach otherwise. (3) **Risk sharing and diversification** — by holding diversified portfolios, banks/funds offer savers better risk-adjusted exposure than they could build individually. (4) **Liquidity provision** — savers get demandable claims while funding long-term investment. (5) **Payments / settlement infrastructure**. (6) **Maturity / denomination transformation** — bridging mismatch between savers' and borrowers' preferences. Each removes a friction that would otherwise depress lending."}, {"id": "fi4", "topic": "Financial Intermediaries", "type": "written", "q": "Discuss the main positions on the balance sheets of commercial banks. How do commercial banks' balance sheets differ from other depository institutions?", "a": "Commercial bank assets: cash and reserves (incl. central bank reserves), interbank lending, securities (Treasuries, agency MBS, corporates), loans (the largest line — C&I, mortgages, consumer credit, commercial real estate), and fixed assets/intangibles. Liabilities: deposits (demand, savings, time) — the dominant funding; wholesale funding (CDs, repo, interbank borrowing, commercial paper, senior unsecured bonds); subordinated debt. Equity: common equity, retained earnings, sometimes preferred stock; sized to satisfy regulatory capital ratios (Basel III). Off balance sheet: loan commitments, letters of credit, derivatives. vs other depository institutions: (i) Savings & loans — historically concentrated in residential mortgages funded by retail deposits; now look more like commercial banks. (ii) Credit unions — member-owned, narrower product set, retail-only deposits and loans, tax-advantaged, cooperative governance. (iii) Investment banks (now bank holding companies post-2008) — much smaller deposit base, larger securities and trading book, more wholesale funding. Commercial banks are distinguished by the breadth of corporate lending and the centrality of deposit funding."}, {"id": "fi5", "topic": "Financial Intermediaries", "type": "written", "q": "What is a bank run? Discuss insolvency risk in the context of banks.", "a": "A bank run is a sudden, mass withdrawal of deposits driven by depositors' fear that the bank cannot honour all withdrawals. Because banks fund illiquid loans with demand deposits, any solvent bank can be tipped into failure by a run: forced asset sales realise losses, equity is wiped out, the bank fails. Diamond-Dybvig (1983) shows runs can be self-fulfilling — if you think others will run, your best response is to run first. Insolvency vs illiquidity: insolvency means liabilities exceed the (mark-to-market) value of assets — equity is negative; illiquidity means the bank cannot meet outflows in the short term even though assets ≥ liabilities at hold-to-maturity values. Runs blur the two: prolonged illiquidity forces fire-sales that *cause* insolvency. Mitigants: deposit insurance (FDIC, Norway's Bankenes sikringsfond up to NOK 2m), central-bank lender-of-last-resort, capital and liquidity regulations (Basel III LCR, NSFR), resolution regimes."}, {"id": "fi6", "topic": "Financial Intermediaries", "type": "written", "q": "What is moral hazard? Give an example and explain. What can financial intermediaries do to mitigate the problem of moral hazard?", "a": "Moral hazard: after a contract is signed, one party can take actions unobservable to the other that affect the payoff. The party with hidden action takes excessive risk because they bear less of the downside. Example: a borrower receives a loan and then chooses a riskier project than agreed because she keeps the upside but the lender bears the downside. Or: a CEO with a debt cushion gambles for resurrection. Mitigation by intermediaries: (i) **Monitoring** — covenants, periodic financial reporting, on-site checks, board observers. (ii) **Collateral** — borrower has skin in the game and a senior lender can repossess. (iii) **Restrictive covenants** — limits on additional debt, dividends, asset sales, capex. (iv) **Equity stake / co-investment** — alignment of incentives. (v) **Reputation / repeat lending** — borrower's future access depends on current behaviour. (vi) **Concentrated ownership** — a single large lender has stronger incentives to monitor than dispersed bondholders."}, {"id": "fi7", "topic": "Financial Intermediaries", "type": "written", "q": "What is adverse selection? Explain and give an example. Why can it restrict the level of flows in financial markets?", "a": "Adverse selection is a *pre-contract* asymmetric information problem: the party that knows more about its own type self-selects in a way that worsens the average quality the uninformed party faces. Akerlof's used-car market: only the worst cars get offered at any given price, so buyers anticipate this and pay less, driving better cars out of the market. In credit: at any given interest rate, the borrowers willing to pay are disproportionately the riskiest (with negative-NPV projects), so lenders raise rates further, driving good borrowers out, leaving only bad ones — credit dries up (Stiglitz-Weiss 1981 credit rationing). It restricts flows because lenders cannot tell good from bad, so they either ration credit or charge prices high enough to discourage good borrowers, shrinking the market. The same logic applies in IPOs (lemons sell first) and insurance (sickest people buy most insurance)."}, {"id": "fi8", "topic": "Financial Intermediaries", "type": "written", "q": "What is adverse selection? Why and how does it affect flows in financial markets? Provide an example and discuss what financial intermediaries can do to mitigate adverse selection.", "a": "As above (pre-contract asymmetric information). Effect on flows: (i) credit rationing — lenders refuse to lend to whole categories of borrowers; (ii) higher prices/spreads to compensate for the average risky borrower drive out the safest, worsening the pool. Example: an insurer pricing health insurance at the population average will attract sicker buyers, raise prices, lose healthier buyers, and so on (death spiral). Intermediary mitigations: (1) **Screening** — credit scoring, financial-statement analysis, character/relationship banking; (2) **Information production / signalling** — requiring audited financials, collateral, equity stakes; (3) **Insurance pooling** with risk classification; (4) **Reputation** — intermediaries that consistently deliver good risk-rated assets attract repeat customers, mitigating the lemons problem; (5) **Mandatory disclosure** (regulator-driven) reduces the adverse selection wedge in IPOs and bond markets. Intermediaries' core economic value is precisely closing this asymmetry."}, {"id": "cr1", "topic": "Crisis & Securitization", "type": "written", "q": "What is securitization? Explain carefully. Discuss the role of securitization in the financial crisis 2007–2009.", "a": "Securitization is the process of pooling financial assets that generate cashflows (typically loans — mortgages, auto loans, credit-card receivables) and issuing tradeable securities backed by those cashflows to investors. A special-purpose vehicle (SPV) buys the loans from the originator, funds itself by issuing tranches of debt and equity-like securities (senior, mezzanine, equity) with different priorities of payment (the 'waterfall'), and the originator gets cash and removes the loans from its balance sheet. Role in the GFC: (i) Originate-to-distribute model degraded screening incentives — originators sold loans within months, so paid less attention to borrower quality (especially in subprime). (ii) Mass production of MBS, then re-securitization into CDOs and CDO² packed correlated mortgage risk into senior tranches that rating agencies wrongly rated AAA. (iii) Investors (banks, money funds, European banks) bought these AAA tranches under-capitalised against true risk, often funded short-term in repo markets (creating maturity mismatch). (iv) Once house prices stopped rising in 2006 and subprime defaults rose, the senior tranches' implied diversification benefits collapsed, ratings were slashed, and the market for these securities froze, trapping holders with assets they could not sell. Losses cascaded through Bear Stearns, Lehman, AIG, and European banks. Securitization itself is not the problem — it can spread risk efficiently when done right — but in 2003–2007 it amplified subprime losses in
