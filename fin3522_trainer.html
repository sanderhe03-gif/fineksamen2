to a systemic crisis."}, {"id": "cr2", "topic": "Crisis & Securitization", "type": "written", "q": "Explain what securitization is and how it contributed to the housing crisis in the US in 2007.", "a": "Securitization (definition as above) contributed to the housing crisis through several channels: (1) **Weakened screening** — originators (countrywide, etc.) earned fees and sold loans on within months, so had little incentive to verify borrower income (NINJA loans). (2) **Risk illusion via tranching** — combining many subprime loans into senior tranches of MBS allegedly produced AAA assets; rating agencies gave AAA ratings on the assumption mortgage defaults were nearly independent across regions. (3) **Massive demand for safe assets** from banks, money funds, foreign reserves was met with AAA MBS / CDOs, fuelling demand for ever more (and lower-quality) mortgages. (4) **Short-term funding of long-term securities** — many investors funded MBS with repo and ABCP, creating shadow-bank liquidity risk. When house prices stalled and defaults rose: (a) loan-pool losses exceeded subordination buffers, hitting senior tranches; (b) ratings were slashed; (c) the repo and ABCP markets refused to roll funding; (d) holders dumped assets, prices collapsed; (e) banks with off-balance-sheet exposure had to consolidate losses. The mortgage market became globally interconnected, so a US housing-price reversal turned into a global banking crisis."}, {"id": "cr3", "topic": "Crisis & Securitization", "type": "written", "q": "What is a sub-prime mortgage? Discuss the role of sub-prime mortgages in the financial crisis.", "a": "A sub-prime mortgage is a residential mortgage to a borrower with weaker credit characteristics than 'prime' — low FICO, limited or undocumented income, high LTV (often >90%), and sometimes teaser rates that reset higher after 2–3 years. Sub-prime market grew from ~5% of US mortgage originations in 2001 to ~20% by 2006. Role in crisis: (i) Driven by securitization demand (above) and by lax underwriting; many loans had minimal documentation or DTI checks. (ii) Borrowers depended on rising house prices to refinance before rate resets; once prices flattened in 2006, defaults surged. (iii) Subprime defaults exceeded the subordination buffers in MBS deals, hitting AAA tranches and shocking investors who believed those tranches were safe. (iv) The losses propagated through the global system because subprime risk had been distributed via MBS, CDOs, and CDS to banks, money funds, and foreign holders. Bear Stearns hedge funds (June 2007), BNP Paribas freezing money funds (Aug 2007), and ultimately Lehman (Sept 2008) all trace back to sub-prime exposure. Sub-prime was the *spark*; securitization, leverage, ratings failures, and short-term funding were the *fuel*."}, {"id": "cr4", "topic": "Crisis & Securitization", "type": "written", "q": "How did the housing crisis in the US amplify into the global financial crisis? Describe at least two reasons.", "a": "(1) **Cross-border distribution of US mortgage risk via securitization.** European, Asian, and Middle-Eastern banks and reserve managers held US MBS and CDOs as 'safe' AAA assets. When subprime defaults blew through subordination, losses hit balance sheets globally — IKB and Landesbanken in Germany, UBS in Switzerland, RBS and Northern Rock in the UK. The losses were therefore not contained to US banks. (2) **Funding-market interconnectedness.** US banks and dealers funded long-dated assets in short-term wholesale markets (repo, ABCP) which were heavily intermediated by global money market funds. When the Reserve Primary Fund 'broke the buck' after Lehman (Sept 2008), there was a global run on prime money funds; this froze short-term funding for non-US banks too. (3) **Counterparty contagion via derivatives.** AIG had written massive CDS protection on senior CDO tranches; when forced to post collateral, AIG faced default which would have hit Goldman, Société Générale, Deutsche Bank, and others — only the Fed bailout prevented contagion. (4) **Trade and confidence channel.** Once banks worldwide were stressed, credit contracted, world trade collapsed in late 2008, and the recession became truly global. (5) **Synchronisation of fire-sale dynamics** — leveraged investors everywhere were forced to deleverage simultaneously, pushing asset prices down and feeding back into bank capital."}, {"id": "cr5", "topic": "Crisis & Securitization", "type": "written", "q": "List and discuss three central factors of the Great Financial Crisis of 2007–2009.", "a": "(1) **Excessive credit growth and house-price bubble (2003–2006)** — fuelled by low interest rates after the dot-com bust, GSE expansion, and rising risk appetite. Rapid mortgage origination, including aggressive subprime lending. (2) **Securitization with weak underwriting and over-rated structured products** — originate-to-distribute weakened screening; rating agencies overestimated diversification benefits in MBS/CDO senior tranches; investors trusted AAA labels and held them under-capitalised. (3) **High leverage and short-term wholesale funding throughout the financial system** — investment banks operated at 25–35× leverage; off-balance-sheet conduits funded long-term MBS with overnight ABCP; SIVs and hedge funds were equally fragile. When asset values fell and funding evaporated, a system-wide deleveraging spiral followed. Other contributing factors: lax regulation (Basel II, gaps in OTC derivatives oversight), interconnectedness via CDS, global savings glut, complacency about housing risks. Together these set up a fragile system in which a relatively small subprime shock became a near-collapse."}, {"id": "cr6", "topic": "Crisis & Securitization", "type": "written", "q": "What were the triggers of the LTCM failure? Describe.", "a": "Long-Term Capital Management (LTCM), founded 1994, ran highly-leveraged relative-value strategies (convergence trades on swap spreads, on-the-run vs off-the-run Treasuries, equity vol arb, sovereign spread compression). Triggers of failure (Aug–Sept 1998): (i) **Russia defaults** on rouble-denominated debt and devalues (Aug 17 1998); (ii) **Flight to quality** — investors dump risky assets and rush into safe Treasuries, blowing out spreads exactly opposite to LTCM's convergence positions across many trades simultaneously; (iii) **Correlated losses** — strategies the firm believed independent moved together in a stress event (correlations go to 1 in crises); (iv) **Massive leverage** (>25×, plus hidden derivative leverage) meant moderate price moves wiped out a huge fraction of equity; (v) **Mark-to-market losses** triggered margin calls; LTCM could not raise capital because counterparties feared it was unwinding; (vi) **Liquidity spiral** — forced liquidation in already-stressed markets moved prices further against LTCM; (vii) Other arbitrageurs cut their own positions to manage risk, removing the natural arbitrage demand. By Sept 1998 LTCM had lost ~$4.6bn (90% of capital). The Fed organised a $3.6bn private-sector recapitalisation (Sept 23 1998) by 14 major banks to avoid a disorderly unwind. Lessons: (a) tail correlations; (b) leverage limits in arbitrage; (c) endogeneity of liquidity; (d) systemic risk from a single hedge fund."}, {"id": "cr7", "topic": "Crisis & Securitization", "type": "written", "q": "What risks for the financial intermediary does holding mortgages on the balance sheet pose? What is the advantage of securitization and loan sales over interest-rate swaps as risk-management tools? Explain.", "a": "Holding mortgages on balance sheet exposes the bank to: (i) **Credit risk** — default by borrowers; (ii) **Interest-rate risk** — long-fixed assets vs short-floating deposits create a duration mismatch; if rates rise, NIM compresses and the asset's market value falls; (iii) **Prepayment risk** — borrowers refinance when rates fall, leaving the bank reinvesting at lower rates (negative convexity); (iv) **Liquidity risk** — mortgages are illiquid; (v) **Concentration risk** — geographic / sector concentration. Interest-rate swaps hedge *only* (ii) — they convert fixed receipts to floating, neutralising the duration mismatch. Securitization and loan sales remove the loan from the balance sheet entirely, transferring **all** risks (credit, interest-rate, prepayment, liquidity) and freeing capital under risk-weighted regulations. Other advantages: (a) raise funding by accessing capital markets directly; (b) recycle capital into new origination; (c) allow specialisation — originate where you have local advantage, distribute risk to investors who want it. Disadvantages versus swaps: (a) higher transaction costs; (b) loss of customer relationship; (c) reduces incentives to monitor (moral hazard, weakened screening — visible in subprime). Swaps are cleaner, cheaper, and reversible but only address the rate dimension; securitization deals with the whole package."}, {"id": "reg1", "topic": "Regulation", "type": "written", "q": "Discuss if and why financial markets should be regulated. Provide examples of at least three regulatory institutions and explain what they supervise. Explain the trade-off between lack of regulations and too many regulations.", "a": "Why regulate: (i) Externalities — bank failures impose costs on depositors, taxpayers, the real economy beyond the failing firm. (ii) Asymmetric information — investors and depositors cannot easily verify firm/issuer quality. (iii) Market power and conduct — manipulation, fraud, conflicts of interest. (iv) Systemic risk — interconnected institutions can fail together. (v) Consumer protection — retail investors and depositors. Examples: **Finanstilsynet (Norway)** — supervises banks, insurance, securities firms, and markets in Norway; ensures financial stability and consumer protection. **SEC (US)** — regulates securities markets, public-company disclosure, investment advisers, mutual funds; enforces against fraud. **ESMA (EU)** — coordinates securities regulation across EU member states, supervises CRAs, sets standards under MiFID II. Other examples: ECB SSM, Federal Reserve, Bank of England PRA/FCA, FINMA. Trade-off: too little regulation → fraud, runs, contagion, taxpayer-funded bailouts (cf. 2008). Too much regulation → compliance costs choke smaller firms, regulatory arbitrage migrates activity to shadow banking, innovation is suppressed, credit becomes scarcer, and capital flows offshore. Optimal regulation is risk-based, principles-based where possible, and adapts to innovation; it imposes costs proportionate to externalities created."}, {"id": "reg2", "topic": "Regulation", "type": "written", "q": "What were the reasons for introducing MiFID II? How is MiFID II different from MiFID I?", "a": "MiFID I (2007) opened EU equity markets to competition between exchanges and MTFs but had gaps: limited bond and derivatives coverage, poor pre/post-trade transparency, broker conflicts of interest, abuses of dark pools, and lack of harmonised investor protection. After the GFC, regulators wanted more transparency, stronger investor protection, and oversight of OTC derivatives. **MiFID II / MiFIR (in force Jan 2018)** therefore: (i) Extends transparency rules to bonds, structured products, and derivatives, not just equities. (ii) Caps trading in dark pools (double volume cap) and creates a new venue category — Organised Trading Facility (OTF). (iii) Mandates trading of standardised derivatives on regulated venues (alongside EMIR clearing). (iv) **Unbundles research from execution commissions** — asset managers must pay separately for sell-side research, ending an opaque cross-subsidy. (v) Strengthens best execution, suitability, and inducement rules. (vi) Tighter requirements on algorithmic and HFT (registration, kill switches, market-maker obligations). (vii) Pre- and post-trade transparency for non-equity instruments. (viii) Enhanced investor protection including product-governance rules and stricter classifications of professional/retail clients. The headline difference: MiFID II is *broader* (more asset classes), *more transparent* (covering bonds, derivatives, dark pools), and *more interventionist* on conflicts of interest (research unbundling, inducements)."}, {"id": "reg3", "topic": "Regulation", "type": "written", "q": "What is the Glass-Steagall Act? Describe the consequences of its introduction and repeal.", "a": "The Glass-Steagall Act (Banking Act of 1933) was passed in the US after the 1929 crash and Depression-era bank failures. Two key separations: (i) Commercial banking (taking deposits, making loans) was separated from investment banking (underwriting, securities trading); a single firm could not do both. (ii) Created the FDIC (federal deposit insurance) and gave the Fed broader regulatory powers. **Consequences of introduction:** restored confidence in commercial banking, reduced conflict of interest between depositors and underwriting clients, dampened speculative excesses, and contributed to a long period of banking stability (1934–1980s). It also meant US investment banks (Morgan Stanley, Goldman Sachs, Lehman) developed as separate, narrowly chartered firms. **Repeal** — Gramm-Leach-Bliley Act 1999 (after years of erosion via Fed interpretations) — allowed financial holding companies to combine commercial banking, investment banking, and insurance. Consequences of repeal: rise of universal banks (Citigroup, JPMorgan, Bank of America); blurred risk culture between deposit-taking and trading; commercial-bank balance sheets exposed to securitization and proprietary trading; arguably contributed (with many other factors) to the build-up of risks before 2008. Post-2008 the Volcker Rule (Dodd-Frank, 2010) re-introduced a partial separation by limiting bank proprietary trading and certain hedge fund / PE investments."}, {"id": "reg4", "topic": "Regulation", "type": "written", "q": "What are government-sponsored enterprises (GSEs)? What role do they serve?", "a": "GSEs are privately-owned but federally-chartered firms operating with implicit (and during 2008 explicit) US government backing. The main housing GSEs are Fannie Mae (Federal National Mortgage Association), Freddie Mac (Federal Home Loan Mortgage Corporation) and the Federal Home Loan Banks. Roles: (i) Buy conforming mortgages from originators, package them into agency MBS, and sell to investors — providing liquidity and standardisation in the US mortgage market. (ii) Lower mortgage rates for households (the implicit guarantee compresses spreads on agency MBS). (iii) Smooth credit availability across regions and through cycles. Other GSEs include the Farm Credit System (agricultural lending), Sallie Mae (originally student loans, since privatised). Pros: deeper, more liquid mortgage market; lower mortgage rates; broader access to credit. Cons: (a) implicit guarantee creates moral hazard and risk-shifting to taxpayers — realised in the Sept 2008 conservatorship of Fannie/Freddie when the US Treasury injected ~$190bn; (b) distortion of credit allocation; (c) the GSEs themselves became too big to fail. Reform of housing-finance GSEs is an ongoing US policy debate."}, {"id": "reg5", "topic": "Regulation", "type": "written", "q": "What are the regulatory concerns regarding cryptocurrencies? List and describe at least four.", "a": "(1) **Investor protection / market integrity** — high volatility, opaque promoters, frequent fraud, pump-and-dump schemes, wash trading on unregulated venues; retail investors face information asymmetry and limited recourse. (2) **Anti-money-laundering (AML) and sanctions** — pseudonymous addresses, mixers, and cross-border transfer make crypto attractive for laundering, ransomware payments, and sanctions evasion; FATF travel rule extended to virtual asset service providers. (3) **Financial stability** — large institutional or banking exposure to crypto creates contagion risk (e.g. Silvergate, Signature, SVB linkages 2023; FTX collapse Nov 2022). Stablecoins backed by short-term assets pose run risk similar to money-market funds. (4) **Custody and operational risk** — exchanges have been hacked (Mt Gox, Coincheck, FTX commingling), keys lost; consumer assets are not always segregated. (5) **Tax compliance** — opaque trading and cross-border flows complicate enforcement; many jurisdictions are still catching up. (6) **Energy / ESG** for proof-of-work (Bitcoin) — large electricity consumption and emissions. (7) **Monetary sovereignty** — adoption of foreign-issued stablecoins or volatile crypto could weaken domestic monetary policy. (8) **Conduct / governance** — DeFi protocols may be effectively unsupervised; smart-contract bugs cause loss; insider information advantages. Major regulatory responses: EU's MiCA (in force 2024), US SEC enforcement, FCA registration, FATF guidance. Tightening continues."}, {"id": "sp1", "topic": "Special Topics", "type": "written", "q": "What is a sovereign wealth fund? What role does it serve and how does it achieve its goals?", "a": "A sovereign wealth fund (SWF) is a state-owned investment fund that invests public funds in domestic or foreign assets — equities, bonds, real estate, infrastructure, private equity. Funded typically by (i) commodity revenues (Norway's GPFG from oil; Saudi PIF; ADIA from oil), (ii) FX reserve accumulation (China CIC, Singapore GIC), or (iii) fiscal surpluses (Singapore Temasek). Roles: (a) **Inter-generational savings** — convert exhaustible resource wealth or windfall income into a permanent financial endowment that benefits future generations (Norway's explicit objective). (b) **Macroeconomic stabilization** — sterilize commodity export inflows to prevent Dutch Disease / currency overvaluation. (c) **Reserve management** — earn return on excess FX reserves above what conventional reserve assets pay. (d) **Strategic / development** — domestic industry investment, infrastructure financing. How they achieve goals: long horizons (multi-generational), high allocations to listed equities and alternatives, diversified global mandates (e.g. Norway's GPFG: ~70% equities, 27.5% fixed income, 2.5% real estate / infrastructure, ~9000 companies in 70+ countries), strict ethical guidelines (Norway's Council on Ethics excludes tobacco, certain weapons, severe environmental damage), and clear governance separating fund management from political pressure. Norway's GPFG (Government Pension Fund Global, ~$1.7T+ AUM) is the largest SWF and a global standard for transparency and governance."}, {"id": "sp2", "topic": "Special Topics", "type": "written", "q": "What contributes to market quality? Describe how financial intermediaries can affect each of the listed factors.", "a": "Market quality is multidimensional: (1) **Liquidity** (tightness, depth, resiliency) — intermediaries (dealers, market makers, HFTs) supply quotes, narrow spreads, absorb temporary order imbalances; banks' securities financing (repo) supports market-maker inventories. (2) **Price efficiency / informativeness** — analyst research, sell-side trading, and arbitrageurs incorporate information into prices; intermediaries' R&D and trading activity is the main channel. (3) **Transaction costs** — brokers, ATSs, exchanges compete on fees; intermediaries' technology lowers costs. (4) **Stability / orderly trading** — clearing houses (CCPs) and prime brokers manage counterparty risk; banks' balance sheet supports orderly markets in stress (with limits — see 2020 'dash for cash'). (5) **Transparency** — exchanges and intermediaries provide post-trade reporting (TRACE, MIFID II reporting). (6) **Access / breadth of investor base** — fund managers, ETF providers, custodians make markets accessible to retail and global investors. Intermediaries can also *harm* market quality: predatory HFT, dark-pool internalization that fragments liquidity, conflicts of interest in research/underwriting, and capital constraints that withdraw liquidity exactly when needed (March 2020 Treasury market). Regulation (MiFID II, Reg NMS, SLR) tries to align intermediary incentives with market quality."}, {"id": "sb1", "topic": "Asset Pricing", "type": "calc", "q": "Stock B: E[R]=8.4%, R_f=2.5%, σ_B=30%, σ_M=20%. Compute the Sharpe ratio of B and explain what it measures.", "a": "Sharpe_B = (E[R_B] − R_f) / σ_B = (8.4% − 2.5%) / 30% = 5.9% / 30% = **0.197**. Sharpe measures *excess return per unit of total volatility* — how much extra return you earn for each percentage point of risk you take. Higher is better for a standalone investment. (Note σ_M is irrelevant to *B's* Sharpe, but you might use it to compare against the market's Sharpe.)"}, {"id": "sb2", "topic": "Asset Pricing", "type": "calc", "q": "Stock B: E[R]=12.4%, R_f=4.5%, σ_B=50%, σ_M=55%. Compute Sharpe of B. Are higher Sharpe portfolios always better? Why or why not?", "a": "Sharpe_B = (12.4% − 4.5%) / 50% = 7.9 / 50 = **0.158**. Higher Sharpe is *generally* better because it dominates lower-Sharpe portfolios for a standalone investor: by levering or de-levering, you can replicate any expected-return target at lower σ from the high-Sharpe portfolio. Caveats: (i) Sharpe penalises upside as well as downside; for skewed payoffs Sortino is preferred. (ii) Sharpe is sample-dependent and can be inflated by smoothed returns or hidden tail risk (e.g. selling deep OTM options gives high Sharpe until the tail event). (iii) Marginal contribution to a *diversified* portfolio depends on β, not standalone Sharpe."}, {"id": "sb3", "topic": "Asset Pricing", "type": "calc", "q": "On the CML: Portfolio A (E[R]=22.3%, σ=0.32), Portfolio B (E[R]=31.4%, σ=0.46). Write the CML equation. Can you compute (i) R_f, (ii) market Sharpe, (iii) market risk premium? If so, calculate.", "a": "On CML: E[R_p] = R_f + Sharpe_M · σ_p. Two equations, two unknowns (R_f, Sharpe_M): 22.3% = R_f + Sharpe_M · 0.32; 31.4% = R_f + Sharpe_M · 0.46. Subtract: 9.1% = Sharpe_M · 0.14 ⇒ Sharpe_M = **0.65** (≈0.65 expected-return per unit σ). From the first: R_f = 22.3% − 0.65·0.32 = 22.3% − 20.8% = **1.5%**. Market risk premium MRP = E[R_M] − R_f. We have Sharpe_M = MRP/σ_M = 0.65, but σ_M is not given, so MRP **cannot** be computed without additional information. (You could only get MRP if you knew σ_M, e.g. that a particular portfolio is the market.) CML: E[R_p] = 1.5% + 0.65·σ_p."}, {"id": "th1", "topic": "Liquidity", "type": "mcq", "q": "Resiliency, as a dimension of liquidity, refers to:", "choices": ["The bid-ask spread", "The depth at the best quote", "The speed at which prices revert to fundamental value after a non-information trade shock", "Time-weighted average price"], "correct": 2, "a": "Resiliency = how quickly liquidity providers refill the book and prices return after temporary order-flow imbalances."}, {"id": "th2", "topic": "Asset Pricing", "type": "mcq", "q": "In APT, factor risk premia (λ_k) represent:", "choices": ["The risk-free rate", "The compensation per unit of exposure to factor k", "The variance of factor k", "The correlation between factors"], "correct": 1, "a": "λ_k is the price of one unit of factor-k risk; total expected excess return is Σ β_ik · λ_k."}, {"id": "th3", "topic": "Bonds & Yield Curve", "type": "mcq", "q": "If a bond's coupon rate is below its yield to maturity, the bond trades:", "choices": ["At par", "At a premium", "At a discount", "At face value"], "correct": 2, "a": "Coupon < YTM ⇒ price < face value (discount). Coupon > YTM ⇒ premium. Coupon = YTM ⇒ par."}, {"id": "th4", "topic": "Bonds & Yield Curve", "type": "mcq", "q": "Under the pure expectations hypothesis, an inverted yield curve implies:", "choices": ["Liquidity premium is high", "Markets expect short rates to fall", "Markets expect short rates to rise", "Term segmentation"], "correct": 1, "a": "Long yields are averages of expected future short rates; if long < short, expected future short rates are below the current short rate."}, {"id": "th5", "topic": "Crisis & Securitization", "type": "mcq", "q": "In the 'originate-to-distribute' model, originators' incentive to screen borrowers tends to:", "choices": ["Increase, because they keep the loan", "Decrease, because they sell the loan quickly and earn fees", "Remain unchanged", "Increase only for jumbo loans"], "correct": 1, "a": "Selling the loan within months means the originator does not bear default cost, weakening the incentive to verify borrower quality — central to the subprime story."}, {"id": "th6", "topic": "Financial Intermediaries", "type": "mcq", "q": "Adverse selection is best described as:", "choices": ["Hidden action after the contract is signed", "Hidden information *before* the contract — the worse types are more likely to participate", "Risk shifting to taxpayers", "Insider trading"], "correct": 1, "a": "Adverse selection = pre-contract asymmetric information; moral hazard = post-contract hidden action. Akerlof's lemons; Stiglitz-Weiss credit rationing."}, {"id": "th7", "topic": "Financial Intermediaries", "type": "mcq", "q": "Moral hazard between a lender and a borrower is mitigated most directly by:", "choices": ["Adverse rating downgrades", "Restrictive covenants and collateral", "Rising risk-free rates", "Forced index inclusion"], "correct": 1, "a": "Covenants constrain risky borrower actions ex post; collateral gives the borrower skin in the game. Both target post-contract behaviour, the moral-hazard concern."}, {"id": "th8", "topic": "Mutual Funds", "type": "mcq", "q": "Berk-Green (2004) imply that even genuinely skilled active managers tend to deliver:", "choices": ["Persistent positive after-fee alpha to investors", "After-fee returns close to the benchmark, because skill is capacity-constrained and capital flows in", "Negative gross alpha", "Returns equal to the risk-free rate"], "correct": 1, "a": "Inflows scale fund AUM until marginal alpha is competed away; the manager keeps the rents (in fees), the investor mostly gets benchmark returns."}, {"id": "th9", "topic": "Microstructure", "type": "mcq", "q": "A limit buy order:", "choices": ["Executes immediately at any price", "Executes only at or below a specified price", "Pays a higher commission than a market order", "Cannot be cancelled"], "correct": 1, "a": "Limit buy: 'I'll pay no more than X.' If best ask ≤ X, it executes; otherwise it sits on the book until conditions are met or it is cancelled."}, {"id": "th10", "topic": "Regulation", "type": "mcq", "q": "A core change introduced by MiFID II vs MiFID I is:", "choices": ["Banning all dark pools", "Unbundling of investment research from execution commissions", "Mandating zero-fee retail brokerage", "Eliminating clearing houses"], "correct": 1, "a": "Research unbundling forces asset managers to pay separately for sell-side research, addressing a long-standing conflict and inducement issue."}, {"id": "th11", "topic": "EMH & Anomalies", "type": "mcq", "q": "Persistent positive alpha for the smallest-cap quintile (after CAPM adjustment) is best classified as:", "choices": ["A violation of weak-form EMH", "A market anomaly potentially explained by an additional risk factor or behavioural bias", "Strong-form EMH", "An arbitrage trade with zero risk"], "correct": 1, "a": "The 'size' anomaly motivated Fama-French's SMB factor. Anomalies often resolve as missing risk factors or limits to arbitrage."}, {"id": "th12", "topic": "Crisis & Securitization", "type": "mcq", "q": "Brunnermeier-Pedersen liquidity spirals link:", "choices": ["Inflation and interest rates", "Market liquidity and funding liquidity", "CPI and PPI", "Sharpe and beta"], "correct": 1, "a": "Falling market liquidity worsens leveraged traders' funding; tighter funding forces more selling; the loop amplifies stress."}, {"id": "th13", "topic": "Asset Pricing", "type": "mcq", "q": "Two assets have the same σ but different β. Under CAPM, the required return is higher for:", "choices": ["The lower-β one", "The higher-β one", "Whichever has higher idiosyncratic risk", "They must be equal because σ is equal"], "correct": 1, "a": "CAPM rewards only β. Equal σ but different β means different systematic risk; the higher-β asset earns the higher risk premium."}, {"id": "th14", "topic": "Bonds & Yield Curve", "type": "mcq", "q": "All else equal, a callable bond should trade at a:", "choices": ["Higher price (lower yield) than an otherwise identical non-callable", "Lower price (higher yield) than an otherwise identical non-callable", "Same price", "Higher coupon but identical price"], "correct": 1, "a": "The call option benefits the issuer; investors demand compensation, so the callable yields more (price lower) than its non-callable twin."}, {"id": "th15", "topic": "Stocks & IPOs", "type": "mcq", "q": "The 'money left on the table' in an IPO is approximately:", "choices": ["Underwriter spread", "(Closing price first day − offer price) × shares offered", "Annual dividend × shares", "R_f × shares"], "correct": 1, "a": "It's the difference between what the firm could have raised at the first-day close versus what it actually got at the offer price."}, {"id": "th16", "topic": "Mutual Funds", "type": "mcq", "q": "Compared to active funds, passive index funds typically have:", "choices": ["Higher fees and higher turnover", "Lower fees and lower turnover", "Higher tracking error", "More frequent benchmark deviation"], "correct": 1, "a": "Passive replicates an index, so fees are minimal and turnover is just rebalancing for index changes."}, {"id": "th17", "topic": "Foundations", "type": "mcq", "q": "A negative-β asset under CAPM should have an expected return:", "choices": ["Above the market", "Equal to the market", "Below the risk-free rate", "Equal to inflation"], "correct": 2, "a": "E[R] = R_f + β·MRP. Negative β ⇒ negative second term ⇒ expected return below R_f. Investors accept this because the asset hedges market risk."}, {"id": "th18", "topic": "Regulation", "type": "mcq", "q": "Glass-Steagall (1933) primarily separated:", "choices": ["Insurance from real estate", "Commercial banking from investment banking", "Banks from regulators", "Banks from each other geographically"], "correct": 1, "a": "It walled off deposit-taking from securities underwriting and dealing, until repealed in 1999 by Gramm-Leach-Bliley."}, {"id": "th19", "topic": "Liquidity", "type": "mcq", "q": "Funding liquidity refers to:", "choices": ["The ability to trade an asset without moving its price", "The ability of an investor or intermediary to obtain financing for its positions", "The size of the bid-ask spread", "Central-bank reserves only"], "correct": 1, "a": "Funding liquidity = can you (re)finance your positions? Market liquidity = can you sell the asset cheaply? Brunnermeier-Pedersen show they reinforce each other."}, {"id": "th20", "topic": "Bonds & Yield Curve", "type": "mcq", "q": "Default risk premium in corporate-bond yields tends to widen most when:", "choices": ["Recession risk rises", "Equity volatility falls", "Real GDP accelerates", "Inflation undershoots"], "correct": 0, "a": "Higher recession risk ⇒ higher expected defaults and a higher risk premium for bearing default risk in bad states. Spreads widened sharply in 2008, 2020, and 2022."}]</script>
<script>/* FIN 3522 Trainer — single-file JS */
const QBANK = JSON.parse(document.getElementById('qbank').textContent);
const TOPICS = [...new Set(QBANK.map(q=>q.topic))];
const STORAGE_KEY = 'fin3522_v1';
const state = loadState();

function loadState(){
  try{ const s = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    return Object.assign({
      seen:{},          // qid -> count
      box:{},           // Leitner box per qid: 1..5
      lastSeen:{},      // qid -> ms
      mcq:{correct:0,total:0},
      written:{done:0}, // count of written reviewed
      mock:{best:null,attempts:0}
    }, s);
  }catch(e){ return {seen:{},box:{},lastSeen:{},mcq:{correct:0,total:0},written:{done:0},mock:{best:null,attempts:0}}; }
}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function bump(qid){ state.seen[qid] = (state.seen[qid]||0)+1; state.lastSeen[qid] = Date.now(); saveState(); }
function setBox(qid,box){ state.box[qid] = Math.max(1,Math.min(5,box)); saveState(); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } return a; }
function el(html){ const t=document.createElement('div'); t.innerHTML=html.trim(); return t.firstElementChild; }
function escapeHTML(s){ return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
document.getElementById('bankCount').textContent = QBANK.length + ' questions across ' + TOPICS.length + ' topics';

const $main = document.getElementById('content');
const tabs = document.querySelectorAll('nav.tabs button');
tabs.forEach(b=>b.addEventListener('click',()=>{ tabs.forEach(t=>t.classList.remove('active')); b.classList.add('active'); render(b.dataset.tab); }));

function render(tab){
  $main.innerHTML='';
  if(tab==='dash') return renderDash();
  if(tab==='study') return renderStudyMethods();
  if(tab==='flash') return renderFlash();
  if(tab==='mcq') return renderMCQ();
  if(tab==='written') return renderWritten();
  if(tab==='mock') return renderMock();
  if(tab==='bank') return renderBank();
}

/* ---------- Dashboard ---------- */
function renderDash(){
  const totalSeen = Object.keys(state.seen).length;
  const pct = Math.round(100*totalSeen/QBANK.length);
  const mcqAcc = state.mcq.total ? Math.round(100*state.mcq.correct/state.mcq.total) : 0;
  const masteredCount = Object.values(state.box).filter(b=>b>=4).length;

  const c = el(`<div>
    <div class="card">
      <h2>Welcome — let's get you exam-ready.</h2>
      <p class="muted">FIN 3522 Markets &amp; Institutions covers a tight set of topics that recur every exam: efficient markets, CAPM/APT, liquidity, the yield curve, bonds &amp; stocks, banks &amp; intermediaries, the 2007–09 crisis, and regulation. The bank below is built from <b>your 8 past papers</b> with model answers and MCQ checks.</p>
      <div class="grid cols-3" style="margin-top:14px">
        <div class="stat"><div class="v">${totalSeen}/${QBANK.length}</div><div class="l">Questions seen (${pct}%)</div></div>
        <div class="stat"><div class="v">${mcqAcc}%</div><div class="l">MCQ accuracy (${state.mcq.total} answered)</div></div>
        <div class="stat"><div class="v">${masteredCount}</div><div class="l">Cards in box 4–5 (mastered)</div></div>
      </div>
      <div class="progress" style="margin-top:12px"><i style="width:${pct}%"></i></div>
    </div>

    <div class="card">
      <h2>How to use this trainer</h2>
      <p>The user asked for "a lot of writing" and MCQ — both are here, plus flashcards (active recall), a full mock exam, and a topic-organised question bank.</p>
      <ul class="clean">
        <li><b>Flashcards</b> — primary mode. Active recall + spaced repetition (Leitner). Use this every day.</li>
        <li><b>MCQ Quiz</b> — fast self-checking. Builds recognition memory. Use after each Flashcards session.</li>
        <li><b>Written Practice</b> — long-form, the way the real exam is graded. Type your answer, then compare with the model.</li>
        <li><b>Mock Exam</b> — 9 questions, 90 minutes timer. Run one a week starting two weeks before the exam.</li>
        <li><b>Question Bank</b> — index everything by topic.</li>
      </ul>
      <p class="muted small">Progress is saved locally in your browser (no account needed). Click "Reset progress" below to wipe it.</p>
      <div style="margin-top:8px"><button class="btn" id="resetBtn">Reset progress</button></div>
    </div>

    <div class="card">
      <h2>Recommended study plans</h2>
      <p class="muted">Pick the plan that matches the time you have. Each is grounded in evidence-based learning research (active recall, spaced repetition, interleaving, retrieval practice).</p>
      <div class="grid cols-3">
        <div class="method">
          <h4>Plan A — 2 weeks (intensive)</h4>
          <p class="small">Days 1–3: Read your notes once + Flashcards on every topic (one full pass). Days 4–7: Written practice, 3–4 Qs/day, focus weak topics. Days 8–11: MCQ quizzes daily + Flashcards review (only ones still in box 1–2). Days 12–13: Two timed mock exams. Day 14: light review, sleep early.</p>
        </div>
        <div class="method">
          <h4>Plan B — 4 weeks (standard, recommended)</h4>
          <p class="small">Week 1: Flashcards daily (15–20 cards) covering all topics; one written question/day. Week 2: Written practice expands to 2–3/day; first MCQ quiz at week's end. Week 3: Mock exam Mon, review weak topics Tue–Fri, second mock Sat. Week 4: Daily MCQ + flashcards on cards still in low boxes; one final mock 3 days before exam.</p>
        </div>
        <div class="method">
          <h4>Plan C — 6 weeks (mastery)</h4>
          <p class="small">Weeks 1–2: One topic per day for first pass. Read source, Flashcards on that topic, write one model answer. Weeks 3–4: Interleaved practice — mix all topics in MCQ + flashcards daily. Weekly written practice (4 Qs). Weeks 5–6: Three mock exams; targeted re-review; teach the hardest topic to a friend (Feynman).</p>
        </div>
      </div>
      <p class="small muted" style="margin-top:10px">Open the <b>Study Methods</b> tab for the science behind these and a full description of each technique.</p>
    </div>
  </div>`);
  $main.appendChild(c);
  document.getElementById('resetBtn').onclick = ()=>{ if(confirm('Reset all progress?')){ localStorage.removeItem(STORAGE_KEY); location.reload(); } };
}

/* ---------- Study Methods ---------- */
function renderStudyMethods(){
  const c = el(`<div>
    <div class="card">
      <h2>Science-backed study methods</h2>
      <p>These are the techniques with the strongest empirical support in cognitive psychology (Dunlosky et al. 2013 meta-review; Roediger &amp; Karpicke; Bjork). They are integrated into this trainer.</p>
      <div class="grid cols-2">
        <div class="method"><h4>1. Active Recall (Retrieval Practice)</h4><p class="small">Force yourself to *retrieve* the answer from memory rather than re-reading the source. Each retrieval strengthens the trace far more than re-reading. Use the <b>Flashcards</b> and <b>Written Practice</b> tabs — say or write the answer *before* flipping. Aim for effortful recall: if it's easy, the question wasn't useful.</p></div>
        <div class="method"><h4>2. Spaced Repetition</h4><p class="small">Review material at expanding intervals — within 24h, 2–3 days later, then weekly — instead of cramming. Memories consolidate during the time *between* reviews. The flashcards mode uses a Leitner system: a card you got right moves to a slower box; wrong moves it back to box 1.</p></div>
        <div class="method"><h4>3. Interleaved Practice</h4><p class="small">Mix topics during a session rather than blocking ('all CAPM, then all liquidity'). Interleaving feels harder and slower but produces better long-term retention and improves your ability to *choose the right tool* on exam day. The MCQ Quiz and Mock Exam interleave by default; the Bank lets you do it manually.</p></div>
        <div class="method"><h4>4. Elaboration / Self-Explanation</h4><p class="small">When you study a model answer, say *why* each step is true and how it connects to other concepts. Don't just read the line "EMH says prices reflect information" — ask "why must arbitrageurs make this true? What's the limit?" This deepens encoding.</p></div>
        <div class="method"><h4>5. The Feynman Technique</h4><p class="small">Pick a topic; explain it as if to a friend with no finance background, in plain language, without jargon. Whenever you stumble, that's the gap — go back, re-learn, retry. Especially good for crisis chains, securitisation, liquidity spirals.</p></div>
        <div class="method"><h4>6. Practice Testing</h4><p class="small">Practice tests under realistic conditions are *more* effective than re-reading or re-highlighting. Use the timed Mock Exam at least twice. Sleep on it — overnight consolidation is real.</p></div>
        <div class="method"><h4>7. Distributed Effort &amp; Sleep</h4><p class="small">Two 45-min sessions on different days &gt; one 90-min session. Sleep 7–9h, especially the night *after* learning new material — REM and SWS sleep are when memory consolidates. Pulling an all-nighter before the exam predictably hurts performance.</p></div>
        <div class="method"><h4>8. Dual Coding</h4><p class="small">Pair words with diagrams: draw the loanable-funds plot, the yield-curve theories, the securitization waterfall, and the liquidity-spiral loop. The combination of visual + verbal representations strengthens retrieval.</p></div>
        <div class="method"><h4>9. Generation Effect</h4><p class="small">Information you generate yourself (writing your own summary, paraphrasing the model answer) is remembered better than information you only read. Always paraphrase before consulting the model answer.</p></div>
        <div class="method"><h4>10. Calibrated Confidence</h4><p class="small">After answering a flashcard, rate your confidence honestly. Re-do the cards you were wrong about *and* the ones you were right about but unsure. Overconfidence is the #1 reason students fail topics they "thought they knew".</p></div>
      </div>
    </div>

    <div class="card">
      <h2>Anti-patterns — stop doing these</h2>
      <ul class="clean">
        <li><b>Highlighting / re-reading.</b> Lowest-yield techniques in the literature. Feels productive, isn't.</li>
        <li><b>Watching the lecture again at 1.5×.</b> Passive. Replace with retrieval.</li>
        <li><b>Block-studying one topic for 3 hours.</b> Prefer interleaving even though it feels harder.</li>
        <li><b>Cramming the night before.</b> Sleep matters more than the marginal hour.</li>
        <li><b>Studying with notes open during practice questions.</b> Defeats retrieval practice; close them.</li>
      </ul>
    </div>

    <div class="card">
      <h2>A model session (≈ 60 minutes)</h2>
      <ol style="margin-left:18px">
        <li>5 min — quick warm-up: review yesterday's failed flashcards.</li>
        <li>20 min — flashcards across mixed topics until you've reviewed ~25 cards.</li>
        <li>25 min — one written question (12 min answering closed-book, 3 min comparing to model, 10 min noting gaps).</li>
        <li>10 min — MCQ quiz of 8 questions; explain each answer to yourself out loud.</li>
      </ol>
      <p class="small muted">Stop on time even if "almost done". Distribution > duration.</p>
    </div>
  </div>`);
  $main.appendChild(c);
}

/* ---------- Flashcards (Leitner) ---------- */
let flashIdx=0, flashDeck=[], flashShown=false, flashTopic='all';
function renderFlash(){
  flashTopic='all'; flashDeck=buildFlashDeck('all'); flashIdx=0; flashShown=false;
  const topicOpts = ['<option value="all">All topics</option>'].concat(TOPICS.map(t=>`<option value="${t}">${t}</option>`)).join('');
  const c = el(`<div>
    <div class="card">
      <div class="flex-spread">
        <h2 style="margin:0">Flashcards <span class="muted small">(active recall + Leitner spacing)</span></h2>
        <div class="row">
          <select id="topicSel" style="width:auto">${topicOpts}</select>
          <button id="onlyDue" class="btn">Due cards only</button>
        </div>
      </div>
      <p class="small muted">Read the question. <b>Speak or write your answer first.</b> Then click "Reveal", and rate yourself: Got it (move to slower box) or Missed (back to box 1). Box 5 cards reappear monthly; box 1 cards reappear immediately.</p>
    </div>
    <div class="card flash" id="flashHolder"></div>
    <div class="card">
      <div class="flex-spread"><div id="flashStats" class="muted small"></div><div><span class="kbd">Space</span> reveal · <span class="kbd">1</span> missed · <span class="kbd">2</span> got it · <span class="kbd">→</span> next</div></div>
    </div>
  </div>`);
  $main.appendChild(c);
  document.getElementById('topicSel').onchange = e=>{ flashTopic=e.target.value; flashDeck=buildFlashDeck(flashTopic); flashIdx=0; flashShown=false; drawFlash(); };
  document.getElementById('onlyDue').onclick = ()=>{ flashDeck = filterDue(flashDeck); flashIdx=0; flashShown=false; drawFlash(); };
  drawFlash();
}
function buildFlashDeck(topic){
  let pool = QBANK.filter(q=> q.type==='written' || q.type==='calc' || q.type==='mcq');
  if(topic && topic!=='all') pool = pool.filter(q=>q.topic===topic);
  return shuffle(pool);
}
function filterDue(deck){
  // due if box 1 always; else if interval since lastSeen passed
  const intervals = {1:0, 2:1*86400e3, 3:3*86400e3, 4:7*86400e3, 5:21*86400e3};
  const now=Date.now();
  return deck.filter(q=>{ const b=state.box[q.id]||1; const last=state.lastSeen[q.id]||0; return (now-last)>=intervals[b]; });
}
function drawFlash(){
  const holder = document.getElementById('flashHolder');
  const stats = document.getElementById('flashStats');
  if(!flashDeck.length){ holder.innerHTML='<p class="muted">No cards in this filter. Pick another topic or clear the due filter.</p>'; stats.textContent=''; return; }
  if(flashIdx>=flashDeck.length) flashIdx=0;
  const q = flashDeck[flashIdx];
  const box = state.box[q.id]||1;
  if(!flashShown){
    holder.innerHTML = `<div class="q"><span class="tag">${q.topic}</span> <span class="tag">box ${box}</span><br><br>${escapeHTML(q.q)}</div>
      <div style="margin-top:18px"><button class="btn primary" id="revealBtn">Reveal answer</button></div>`;
    document.getElementById('revealBtn').onclick = revealFlash;
  } else {
    let answerHtml = q.type==='mcq' ? `<b>Correct:</b> ${escapeHTML(q.choices[q.correct])}<br><br>${escapeHTML(q.a)}` : escapeHTML(q.a);
    holder.innerHTML = `<div class="q" style="font-size:17px"><span class="tag">${q.topic}</span><br><br>${escapeHTML(q.q)}</div>
      <div class="a" style="margin-top:14px;background:#1c2230;padding:14px 16px;border-radius:10px;border-left:3px solid var(--accent)">${answerHtml}</div>
      <div class="row" style="margin-top:14px;justify-content:center">
        <button class="btn bad" id="missBtn">Missed (back to box 1)</button>
        <button class="btn good" id="gotBtn">Got it (advance box)</button>
      </div>`;
    document.getElementById('missBtn').onclick = ()=>{ setBox(q.id,1); bump(q.id); next(); };
    document.getElementById('gotBtn').onclick = ()=>{ setBox(q.id,(state.box[q.id]||1)+1); bump(q.id); next(); };
  }
  stats.textContent = `Card ${flashIdx+1} / ${flashDeck.length} · ${q.topic} · box ${box}`;
}
function revealFlash(){ flashShown=true; drawFlash(); }
function next(){ flashShown=false; flashIdx++; drawFlash(); }
window.addEventListener('keydown', e=>{
  if(document.querySelector('nav.tabs button.active').dataset.tab!=='flash') return;
  if(e.key===' '){ e.preventDefault(); if(!flashShown) revealFlash(); }
  else if(e.key==='ArrowRight'){ next(); }
  else if(e.key==='1' && flashShown){ const q=flashDeck[flashIdx]; setBox(q.id,1); bump(q.id); next(); }
  else if(e.key==='2' && flashShown){ const q=flashDeck[flashIdx]; setBox(q.id,(state.box[q.id]||1)+1); bump(q.id); next(); }
});

/* ---------- MCQ Quiz ---------- */
let mcqDeck=[], mcqIdx=0, mcqAnswered=false, mcqRoundStats={correct:0,total:0};
function renderMCQ(){
  mcqDeck = shuffle(QBANK.filter(q=>q.type==='mcq')); mcqIdx=0; mcqAnswered=false; mcqRoundStats={correct:0,total:0};
  const c = el(`<div>
    <div class="card"><h2>MCQ Quiz</h2>
      <p class="small muted">All MCQs interleaved. Each answer comes with an explanation. Your overall accuracy and per-round score are tracked.</p>
    </div>
    <div class="card" id="mcqHolder"></div>
  </div>`);
  $main.appendChild(c);
  drawMCQ();
}
function drawMCQ(){
  const h=document.getElementById('mcqHolder');
  if(!mcqDeck.length){ h.innerHTML='<p>No MCQs available.</p>'; return; }
  if(mcqIdx>=mcqDeck.length){
    h.innerHTML = `<h2>Round complete</h2>
      <p>Score: <b>${mcqRoundStats.correct}/${mcqRoundStats.total}</b> (${Math.round(100*mcqRoundStats.correct/mcqRoundStats.total)}%).</p>
      <p class="muted small">Lifetime accuracy: ${state.mcq.correct}/${state.mcq.total} (${state.mcq.total?Math.round(100*state.mcq.correct/state.mcq.total):0}%).</p>
      <button class="btn primary" id="againBtn">Another round</button>`;
    document.getElementById('againBtn').onclick = ()=>{ mcqDeck=shuffle(QBANK.filter(q=>q.type==='mcq')); mcqIdx=0; mcqAnswered=false; mcqRoundStats={correct:0,total:0}; drawMCQ(); };
    return;
  }
  const q = mcqDeck[mcqIdx];
  h.innerHTML = `<div class="muted small">Q ${mcqIdx+1} / ${mcqDeck.length} · ${q.topic}</div>
    <p class="q-text">${escapeHTML(q.q)}</p>
    <div id="choices"></div>
    <div id="mcqExplain" style="display:none"></div>
    <div class="row" style="margin-top:12px"><button class="btn" id="mcqNext" disabled>Next →</button></div>`;
  const ch = document.getElementById('choices');
  q.choices.forEach((c,i)=>{
    const b = document.createElement('button');
    b.className='choice'; b.textContent = `${String.fromCharCode(65+i)}. ${c}`;
    b.onclick=()=>chooseMCQ(i);
    ch.appendChild(b);
  });
  document.getElementById('mcqNext').onclick = ()=>{ mcqIdx++; mcqAnswered=false; drawMCQ(); };
}
function chooseMCQ(i){
  if(mcqAnswered) return;
  const q=mcqDeck[mcqIdx];
  mcqAnswered=true;
  const buttons = document.querySelectorAll('#choices .choice');
  buttons.forEach((b,k)=>{ b.classList.add('disabled'); if(k===q.correct) b.classList.add('correct'); if(k===i && i!==q.correct) b.classList.add('wrong'); });
  const ok = i===q.correct;
  state.mcq.total++; if(ok) state.mcq.correct++; saveState(); bump(q.id);
  mcqRoundStats.total++; if(ok) mcqRoundStats.correct++;
  const exp=document.getElementById('mcqExplain');
  exp.style.display='block';
  exp.innerHTML = `<div class="answer-box" style="margin-top:12px"><b>${ok?'Correct.':'Incorrect.'}</b> ${escapeHTML(q.a)}</div>`;
  document.getElementById('mcqNext').disabled=false;
}

/* ---------- Written practice ---------- */
let writtenDeck=[], writtenIdx=0, writtenTopic='all';
function renderWritten(){
  writtenTopic='all';
  writtenDeck = shuffle(QBANK.filter(q=>q.type==='written'||q.type==='calc'));
  writtenIdx=0;
  const topicOpts = ['<option value="all">All topics</option>'].concat(TOPICS.map(t=>`<option value="${t}">${t}</option>`)).join('');
  const c = el(`<div>
    <div class="card">
      <div class="flex-spread"><h2 style="margin:0">Written Practice</h2>
        <select id="wtopic" style="width:auto">${topicOpts}</select>
      </div>
      <p class="small muted">Type your answer in the box. <b>Don't peek</b>. When you're done, click "Compare with model answer". Read your answer next to the model and note the gaps. Aim for ~half a page (200–300 words) per question — the real exam guideline.</p>
    </div>
    <div class="card" id="wHolder"></div>
  </div>`);
  $main.appendChild(c);
  document.getElementById('wtopic').onchange = e=>{ writtenTopic=e.target.value; const pool = (e.target.value==='all'?QBANK.filter(q=>q.type==='written'||q.type==='calc'):QBANK.filter(q=>q.topic===e.target.value && (q.type==='written'||q.type==='calc'))); writtenDeck=shuffle(pool); writtenIdx=0; drawWritten(); };
  drawWritten();
}
function drawWritten(){
  const h=document.getElementById('wHolder');
  if(!writtenDeck.length){ h.innerHTML='<p class="muted">No written questions in this topic.</p>'; return; }
  if(writtenIdx>=writtenDeck.length) writtenIdx=0;
  const q=writtenDeck[writtenIdx];
  h.innerHTML = `<div class="muted small">Q ${writtenIdx+1} / ${writtenDeck.length} · ${q.topic} · ${q.type==='calc'?'numerical':'written'}</div>
    <p class="q-text">${escapeHTML(q.q)}</p>
    <textarea id="userAns" placeholder="Write your answer here. Aim for ~half a page."></textarea>
    <div id="wWordCount" class="legend"></div>
    <div class="row" style="margin-top:10px">
      <button class="btn primary" id="reveal">Compare with model answer</button>
      <button class="btn" id="skip">Skip → next</button>
    </div>
    <div id="modelAns"></div>`;
  const ta = document.getElementById('userAns'); const wc=document.getElementById('wWordCount');
  ta.addEventListener('input',()=>{ const w=ta.value.trim().split(/\s+/).filter(Boolean).length; wc.textContent=`${w} words`; });
  document.getElementById('reveal').onclick = ()=>{
    document.getElementById('modelAns').innerHTML = `<div class="card" style="background:var(--panel2);margin-top:14px"><h3 style="margin-top:0">Model answer</h3><div class="answer-box" style="border-left:3px solid var(--good)">${escapeHTML(q.a)}</div>
      <div class="row" style="margin-top:10px">
        <button class="btn good" id="markGood">I had it</button>
        <button class="btn bad" id="markBad">I missed key points</button>
      </div></div>`;
    document.getElementById('markGood').onclick = ()=>{ state.written.done++; bump(q.id); setBox(q.id,(state.box[q.id]||1)+1); saveState(); writtenIdx++; drawWritten(); };
    document.getElementById('markBad').onclick = ()=>{ state.written.done++; bump(q.id); setBox(q.id,1); saveState(); writtenIdx++; drawWritten(); };
  };
  document.getElementById('skip').onclick = ()=>{ writtenIdx++; drawWritten(); };
}

/* ---------- Mock Exam ---------- */
let mockSet=[], mockTimer=null, mockSecondsLeft=0, mockState={};
function renderMock(){
  const c = el(`<div>
    <div class="card">
      <h2>Mock Exam</h2>
      <p class="small muted">Realistic simulation: 9 written/numerical questions, 90-minute timer, no peeking. After submission you can compare with model answers and self-mark.</p>
      <div class="row">
        <button class="btn primary" id="startMock">Start 90-minute mock</button>
        <button class="btn" id="startMockShort">Start 45-minute half-mock (5 Qs)</button>
      </div>
      ${state.mock.attempts?`<p class="small muted">Past attempts: ${state.mock.attempts}. Best self-marked: ${state.mock.best ?? '—'}/${state.mock.bestTotal??'—'}.</p>`:''}
    </div>
    <div id="mockBody"></div>
  </div>`);
  $main.appendChild(c);
  document.getElementById('startMock').onclick = ()=>startMock(9, 90*60);
  document.getElementById('startMockShort').onclick = ()=>startMock(5, 45*60);
}
function startMock(n, secs){
  // Pick one question per topic where possible, written/calc only.
  const pool = QBANK.filter(q=>q.type==='written'||q.type==='calc');
  const byTopic = {}; pool.forEach(q=>{(byTopic[q.topic]=byTopic[q.topic]||[]).push(q);});
  const topics = shuffle(Object.keys(byTopic));
  const set=[]; for(const t of topics){ if(set.length<n){ set.push(shuffle(byTopic[t])[0]); } }
  while(set.length<n){ set.push(shuffle(pool)[0]); }
  mockSet = set; mockState = {answers:{}, marks:{}};
  mockSecondsLeft = secs; clearInterval(mockTimer);
  drawMock();
  mockTimer = setInterval(()=>{ mockSecondsLeft--; if(mockSecondsLeft<=0){ clearInterval(mockTimer); submitMock(); } updateMockTimer(); },1000);
}
function fmtTime(s){ const m=Math.floor(s/60), sec=s%60; return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`; }
function updateMockTimer(){ const t=document.getElementById('mockTimer'); if(t) t.textContent='⏱ '+fmtTime(Math.max(0,mockSecondsLeft)); }
function drawMock(){
  const body = document.getElementById('mockBody');
  body.innerHTML = `<div class="card"><div class="flex-spread"><b>Mock exam in progress</b><span class="timer" id="mockTimer">⏱ ${fmtTime(mockSecondsLeft)}</span></div></div>`;
  mockSet.forEach((q,i)=>{
    const card = document.createElement('div'); card.className='card';
    card.innerHTML = `<div class="muted small">Q${i+1} · ${q.topic}</div>
      <p class="q-text">${escapeHTML(q.q)}</p>
      <textarea id="mock_${i}" placeholder="Type your answer..."></textarea>`;
    body.appendChild(card);
    card.querySelector('textarea').addEventListener('input',e=>{ mockState.answers[i]=e.target.value; });
  });
  const submit = el(`<div class="card"><button class="btn primary" id="submitMock">Submit mock exam</button></div>`);
  body.appendChild(submit);
  document.getElementById('submitMock').onclick = submitMock;
  updateMockTimer();
}
function submitMock(){
  clearInterval(mockTimer);
  const body = document.getElementById('mockBody');
  body.innerHTML = `<div class="card"><h2>Mock submitted — self-mark below</h2><p class="small muted">For each question, read your answer next to the model and mark yourself out of the question's points. Aim for honest, harsh marking — examiners do.</p></div>`;
  let total=0;
  mockSet.forEach((q,i)=>{
    const ua = mockState.answers[i] || '';
    const card = document.createElement('div'); card.className='card';
    const pts = 10;
    total+=pts;
    card.innerHTML = `<div class="muted small">Q${i+1} · ${q.topic} · ${pts} pts</div>
      <p class="q-text">${escapeHTML(q.q)}</p>
      <h3>Your answer</h3>
      <div class="answer-box">${escapeHTML(ua||'(blank)')}</div>
      <h3>Model answer</h3>
      <div class="answer-box" style="border-left-color:var(--good)">${escapeHTML(q.a)}</div>
      <div class="row" style="margin-top:10px;align-items:center">
        <span>Self-mark:</span>
        <select class="markSel" data-i="${i}" style="width:auto"><option value="0">0</option><option value="2">2</option><option value="4">4</option><option value="6">6</option><option value="8">8</option><option value="10">10</option></select>
        <span class="muted small">/ ${pts}</span>
      </div>`;
    body.appendChild(card);
  });
  const finish = el(`<div class="card"><button class="btn primary" id="finishMock">Finish &amp; record</button> <span id="totalMark" class="muted small"></span></div>`);
  body.appendChild(finish);
  body.querySelectorAll('.markSel').forEach(s=>s.addEventListener('change',()=>{
    let sum=0; body.querySelectorAll('.markSel').forEach(x=>sum+=parseInt(x.value||'0',10));
    document.getElementById('totalMark').textContent = `Provisional: ${sum} / ${total}`;
  }));
  document.getElementById('finishMock').onclick = ()=>{
    let sum=0; body.querySelectorAll('.markSel').forEach(x=>sum+=parseInt(x.value||'0',10));
    state.mock.attempts++; if(state.mock.best===null || sum>state.mock.best){ state.mock.best=sum; state.mock.bestTotal=total; }
    saveState();
    alert(`Recorded: ${sum}/${total}.`);
    renderMock();
  };
}

/* ---------- Question Bank ---------- */
function renderBank(){
  const groups={}; QBANK.forEach(q=>{(groups[q.topic]=groups[q.topic]||[]).push(q);});
  const c = el(`<div><div class="card"><h2>Question Bank</h2><p class="small muted">${QBANK.length} questions across ${TOPICS.length} topics. Click a topic to expand. Use the bank to drill weak areas individually.</p></div></div>`);
  $main.appendChild(c);
  Object.keys(groups).sort().forEach(t=>{
    const card = document.createElement('div'); card.className='card';
    const writtenN = groups[t].filter(q=>q.type==='written').length;
    const calcN = groups[t].filter(q=>q.type==='calc').length;
    const mcqN = groups[t].filter(q=>q.type==='mcq').length;
    let html = `<details><summary>${t} <span class="muted small">— ${groups[t].length} questions (${writtenN} written, ${calcN} calc, ${mcqN} MCQ)</span></summary>`;
    groups[t].forEach((q,i)=>{
      let answerHtml = q.type==='mcq' ? `<b>Correct:</b> ${escapeHTML(q.choices[q.correct])}<br><br>${escapeHTML(q.a)}` : escapeHTML(q.a);
      const choices = q.type==='mcq' ? '<ul class="clean">'+q.choices.map((c,k)=>`<li>${String.fromCharCode(65+k)}. ${escapeHTML(c)}</li>`).join('')+'</ul>' : '';
      html += `<details style="margin-top:8px"><summary>${i+1}. ${escapeHTML(q.q)} <span class="tag">${q.type}</span></summary>${choices}<div class="answer-box" style="margin-top:8px">${answerHtml}</div></details>`;
    });
    html += '</details>';
    card.innerHTML = html;
    $main.appendChild(card);
  });
}

render('dash');
</script>
